<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robin des Airs — CRM</title>
<link rel="icon" href="/favicon.png" type="image/png">
<style>
  :root {
    --navy:   #0B1F3A;
    --green:  #007A4C;
    --green2: #005e3a;
    --gold:   #C9A84C;
    --red:    #A32D2D;
    --orange: #854F0B;
    --gray:   #4A4A4A;
    --bg:     #FFFFFF;
    --bg2:    #F7F8FA;
    --bg3:    #F0F2F5;
    --border: #E2E4E8;
    --text:   #1A1A2E;
    --text2:  #6B7280;
    --text3:  #9CA3AF;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg2); color: var(--text); font-size: 14px; min-height: 100vh; }

  /* ── TOPBAR ── */
  .topbar { background: var(--navy); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .brand { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -.3px; }
  .brand span { color: var(--gold); }
  .brand-sub { font-size: 12px; color: rgba(255,255,255,.5); margin-top: 2px; }
  .btn { padding: 8px 16px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; }
  .btn:hover { background: var(--bg3); }
  .btn-primary { background: var(--green); color: #fff; border-color: var(--green); }
  .btn-primary:hover { background: var(--green2); border-color: var(--green2); }
  .btn-sm { padding: 5px 11px; font-size: 12px; }
  .btn-danger { color: var(--red); border-color: #f0c0c0; }
  .btn-danger:hover { background: #fff5f5; }

  /* ── LAYOUT ── */
  .app { max-width: 1400px; margin: 0 auto; padding: 24px; }

  /* ── MÉTRIQUES ── */
  .metrics { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 12px; margin-bottom: 20px; }
  .metric { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .metric-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .metric-val { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1; }
  .metric-val.green { color: var(--green); }
  .metric-val.orange { color: #BA7517; }
  .metric-val.navy { color: var(--navy); }

  /* ── CONTROLS ── */
  .controls { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .controls input, .controls select { font-size: 13px; padding: 8px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; }
  .controls input { flex: 1; min-width: 180px; }
  .controls input:focus, .controls select:focus { border-color: var(--green); }

  /* ── TABLE ── */
  .table-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 960px; }
  thead th { background: var(--bg2); padding: 11px 14px; text-align: left; font-weight: 600; color: var(--text2); font-size: 11px; text-transform: uppercase; letter-spacing: .4px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background .12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #F0FAF6; }
  tbody td { padding: 12px 14px; vertical-align: middle; }
  .td-id { font-weight: 600; color: var(--navy); font-size: 12px; }
  .td-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* ── BADGES ── */
  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
  .s-BROUILLON { background: #F1EFE8; color: #5F5E5A; }
  .s-ELIGIBLE { background: #DBEAFE; color: #1D4ED8; }
  .s-MANDAT_SIGNE { background: #D1FAE5; color: #065F46; }
  .s-LRAR_ENVOYEE { background: #FEF3C7; color: #92400E; }
  .s-RELANCE_1, .s-RELANCE_2 { background: #FEE2E2; color: #991B1B; }
  .s-CONTENTIEUX { background: #FCE7F3; color: #9D174D; }
  .s-PAYE { background: #D1FAE5; color: #064E3B; }
  .s-REFUSE_DEFINITIF, .s-ABANDON, .s-PRESCRIT { background: #FEE2E2; color: #7F1D1D; }
  .moratoire-pill { background: #FEF3C7; color: #92400E; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 5px; white-space: nowrap; }
  .moratoire-soon { background: #F0FAF5; color: var(--green); font-size: 11px; padding: 3px 8px; border-radius: 5px; }

  /* ── MODAL ── */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
  .modal { background: var(--bg); border-radius: var(--radius); border: 1px solid var(--border); width: 100%; max-width: 620px; max-height: 92vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.18); }
  .modal-header { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 1; }
  .modal-header h2 { font-size: 16px; font-weight: 700; color: var(--navy); }
  .modal-body { padding: 20px; }
  .modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; position: sticky; bottom: 0; background: var(--bg); }

  /* ── FORM ── */
  .section-title { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .6px; margin: 16px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 4px; }
  .field input, .field select, .field textarea { width: 100%; font-size: 13px; padding: 8px 11px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; transition: border .15s; }
  .field input:focus, .field select:focus { border-color: var(--green); }
  .field textarea { resize: vertical; min-height: 60px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .indicatif-row { display: grid; grid-template-columns: 110px 1fr; gap: 8px; }

  /* ── CALC BOX ── */
  .calc-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; margin-top: 10px; }
  .calc-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
  .calc-row span:last-child { font-weight: 600; color: var(--text); }
  .calc-sep { border-top: 1px solid var(--border); margin: 8px 0; }
  .calc-total { display: flex; justify-content: space-between; font-size: 15px; font-weight: 700; }
  .calc-note { font-size: 11px; color: var(--text3); margin-top: 6px; }

  /* ── MORATOIRE BOX ── */
  .moratoire-box { background: #FFFBEB; border: 1px solid #F6C847; border-radius: var(--radius-sm); padding: 14px 16px; margin-top: 10px; }
  .moratoire-box-title { font-size: 12px; font-weight: 700; color: #92400E; margin-bottom: 8px; }

  /* ── TABS ── */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .tab { padding: 10px 16px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s; }
  .tab:hover { color: var(--navy); }
  .tab.active { color: var(--green); border-bottom-color: var(--green); font-weight: 600; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── DETAIL ROWS ── */
  .detail-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { color: var(--text2); flex-shrink: 0; }
  .detail-val { font-weight: 600; text-align: right; max-width: 60%; }

  /* ── EVENTS ── */
  .event-item { display: flex; gap: 12px; margin-bottom: 12px; }
  .event-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); margin-top: 5px; flex-shrink: 0; }
  .event-text { font-size: 13px; font-weight: 500; color: var(--text); }
  .event-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* ── VOL CARD ── */
  .vol-card { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 10px; position: relative; background: var(--bg2); }
  .vol-card-title { font-size: 11px; font-weight: 700; color: var(--navy); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
  .remove-vol-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--red); cursor: pointer; font-size: 16px; line-height: 1; padding: 2px 6px; border-radius: 4px; }
  .remove-vol-btn:hover { background: #fee2e2; }

  /* ── PRIO COLORS ── */
  .prio-HAUTE { color: var(--red); font-weight: 700; }
  .prio-STANDARD { color: var(--navy); }
  .prio-BASSE { color: var(--text3); }
  .prio-URGENTE { color: #6D28D9; font-weight: 700; }

  .empty-state { text-align: center; padding: 48px 20px; color: var(--text2); }
  .empty-state p { margin-top: 8px; font-size: 13px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 700px) {
    .metrics { grid-template-columns: repeat(2, 1fr); }
    .row2, .row3 { grid-template-columns: 1fr; }
    .app { padding: 12px; }
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div>
    <div class="brand">ROBIN <span>des Airs</span></div>
    <div class="brand-sub">Gestion des dossiers d'indemnisation</div>
  </div>
  <button class="btn btn-primary" onclick="openNew()">+ Nouveau dossier</button>
</div>

<div class="app">
  <!-- MÉTRIQUES -->
  <div class="metrics" id="metrics"></div>

  <!-- FILTRES -->
  <div class="controls">
    <input type="text" id="search" placeholder="🔍  Passager, vol, PNR…" oninput="render()">

      <option value="RELANCE_1">Relance 1</option>
      <option value="CONTENTIEUX">Contentieux</option>
      <option value="PAYE">Payé</option>
      <option value="REFUSE_DEFINITIF">Refusé</option>
    </select>
    <select id="filterPalier" onchange="render()">
      <option value="">Tous les paliers</option>
      <option value="600">600 €</option>
      <option value="400">400 €</option>
      <option value="250">250 €</option>
    </select>
  </div>

  <!-- TABLEAU -->
  <div class="table-card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Dossier</th>
            <th>Passager(s)</th>
            <th>Vol</th>
            <th>Palier</th>
            <th>Net client</th>
            <th>Net Robin</th>
            <th>Indemnité moratoire</th>
            <th>Statut</th>
            <th>Priorité</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL DÉTAIL -->
<div class="modal-bg" id="modalDetail" style="display:none" onclick="if(event.target===this)closeAll()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="detail-title">Dossier</h2>
      <button class="btn btn-sm" onclick="closeAll()">✕ Fermer</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
  </div>
</div>

<!-- MODAL NOUVEAU -->
<div class="modal-bg" id="modalNew" style="display:none" onclick="if(event.target===this)closeAll()">
  <div class="modal">
    <div class="modal-header">
      <h2>Nouveau dossier</h2>
      <button class="btn btn-sm" onclick="closeAll()">✕</button>
    </div>
    <div class="modal-body">
      <div class="section-title">Passager principal</div>
      <div class="row2">
        <div class="field"><label>Prénom</label><input id="n_prenom" placeholder="Aminata"></div>
        <div class="field"><label>Nom</label><input id="n_nom" placeholder="DIALLO"></div>
      </div>
      <div class="field">
        <label>Téléphone</label>
        <div class="indicatif-row">
          <select id="n_indicatif">
            <option value="+33">🇫🇷 +33</option>
            <option value="+32">🇧🇪 +32</option>
            <option value="+41">🇨🇭 +41</option>
            <option value="+31">🇳🇱 +31</option>
            <option value="+44">🇬🇧 +44</option>
            <option value="+221">🇸🇳 +221</option>
            <option value="+225">🇨🇮 +225</option>
            <option value="+243">🇨🇩 +243</option>
            <option value="+223">🇲🇱 +223</option>
            <option value="+237">🇨🇲 +237</option>
            <option value="+229">🇧🇯 +229</option>
            <option value="+212">🇲🇦 +212</option>
            <option value="+213">🇩🇿 +213</option>
            <option value="+216">🇹🇳 +216</option>
          </select>
          <input id="n_tel" placeholder="6 12 34 56 78">
        </div>
      </div>
      <div class="field"><label>E-mail</label><input id="n_email" placeholder="email@…" type="email"></div>
      <div class="row2">
        <div class="field"><label>Adultes (indemnisés CE 261)</label><input id="n_adultes" type="number" min="1" max="9" value="1" oninput="updateCalcNew()"></div>
        <div class="field"><label>Bébés &lt; 2 ans (non indemnisés)</label><input id="n_bebes" type="number" min="0" max="9" value="0" oninput="updateCalcNew()"></div>
      </div>
      <div class="field">
        <label>Source acquisition</label>
        <select id="n_source">
          <option value="autre" selected>Autre</option>
          <option value="tiktok_ad">TikTok Ads</option>
          <option value="fb_reels">Facebook / Reels</option>
          <option value="instagram">Instagram</option>
          <option value="youtube">YouTube</option>
          <option value="whatsapp">WhatsApp direct</option>
          <option value="referral">Parrainage</option>
          <option value="organic_site">Site organique</option>
          <option value="blog">Blog Robin des Airs</option>
        </select>
      </div>

      <div class="section-title">Vols</div>
      <div id="vols-container"></div>
      <button class="btn btn-sm" style="width:100%;margin-bottom:4px" onclick="addVolForm()">+ Ajouter un vol (correspondance)</button>

      <div class="section-title">Indemnité</div>
      <div class="row2">
        <div class="field">
          <label>Palier CE 261</label>
          <select id="n_palier" onchange="updateCalcNew()">
            <option value="600">600 € — vol > 3 500 km</option>
            <option value="400">400 € — 1 500 à 3 500 km</option>
            <option value="250">250 € — ≤ 1 500 km</option>
          </select>
        </div>
        <div class="field">
          <label>Priorité</label>
          <select id="n_priorite">
            <option value="STANDARD" selected>Standard</option>
            <option value="HAUTE">Haute</option>
            <option value="BASSE">Basse</option>
            <option value="URGENTE">Urgente</option>
          </select>
        </div>
      </div>
      <div id="new-calc-display"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeAll()">Annuler</button>
      <button class="btn btn-primary" onclick="saveNew()">Créer le dossier →</button>
    </div>
  </div>
</div>

<script>
const STATUT_LABELS = {BROUILLON:'Brouillon',ELIGIBLE:'Éligible',MANDAT_SIGNE:'Mandat signé',LRAR_ENVOYEE:'LRAR envoyée',RELANCE_1:'Relance 1',RELANCE_2:'Relance 2',CONTENTIEUX:'Contentieux',PAYE:'Payé',REFUSE_DEFINITIF:'Refusé',ABANDON:'Abandonné',PRESCRIT:'Prescrit'};
const TAUX = 0.0665;

function today(){ return new Date().toISOString().slice(0,10); }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x.toISOString().slice(0,10); }
function diffDays(a,b){ return Math.floor((new Date(b)-new Date(a))/(86400000)); }

function calcFin(palier,nb){
  const brut=palier*nb, comm=Math.round(brut*.25*100)/100, net=brut-comm;
  return {brut,comm,net,parPax:Math.round(net/nb*100)/100,totalReclame:brut+40};
}

function calcMoratoire(lrar){
  if(!lrar) return null;
  const j16=addDays(lrar,16), now=today();
  if(now<j16) return {actif:false,j16,jours:0,interets:0,total:40};
  const jours=diffDays(j16,now);
  return {actif:true,j16,jours,interets:0,total:40};
}

let volIdx=1;
function initVolForm(){
  volIdx=1;
  document.getElementById('vols-container').innerHTML=volCardHTML(1,'Vol principal',false);
}
function volCardHTML(i,label,removable){
  return `<div class="vol-card" id="vc${i}">
    <div class="vol-card-title">${label}</div>
    ${removable?`<button class="remove-vol-btn" onclick="document.getElementById('vc${i}').remove()">✕</button>`:''}
    <div class="row3">
      <div class="field"><label>Compagnie</label><input id="vc${i}_comp" placeholder="Air France"></div>
      <div class="field"><label>N° vol</label><input id="vc${i}_vol" placeholder="AF 719"></div>
      <div class="field"><label>Date</label><input id="vc${i}_date" type="date"></div>
    </div>
    <div class="row3">
      <div class="field"><label>Départ (IATA)</label><input id="vc${i}_dep" maxlength="3" placeholder="CDG" style="text-transform:uppercase"></div>
      <div class="field"><label>Arrivée (IATA)</label><input id="vc${i}_arr" maxlength="3" placeholder="DSS" style="text-transform:uppercase"></div>
      <div class="field"><label>PNR</label><input id="vc${i}_pnr" maxlength="6" placeholder="AB4XYZ" style="text-transform:uppercase"></div>
    </div>
    <div class="field"><label>Incident</label>
      <select id="vc${i}_inc">
        <option value="RETARD">Retard ≥ 3h</option>
        <option value="ANNULATION">Annulation</option>
        <option value="CORRESPONDANCE_MANQUEE">Correspondance manquée</option>
        <option value="REFUS_EMBARQUEMENT">Refus embarquement</option>
      </select>
    </div>
  </div>`;
}
function addVolForm(){
  volIdx++;
  const c=document.getElementById('vols-container');
  const d=document.createElement('div');
  d.innerHTML=volCardHTML(volIdx,`Vol ${volIdx} — Correspondance`,true);
  c.appendChild(d.firstElementChild);
}

function updateCalcNew(){
  const palier=parseInt(document.getElementById('n_palier')?.value)||600;
  const adultes=parseInt(document.getElementById('n_adultes')?.value)||1;
  const bebes=parseInt(document.getElementById('n_bebes')?.value)||0;
  const f=calcFin(palier,adultes);
  const el=document.getElementById('new-calc-display');
  if(!el)return;
  el.innerHTML=`<div class="calc-box">
    <div class="calc-row"><span>Palier CE 261 × ${adultes} adulte(s)</span><span>${palier} × ${adultes} = ${f.brut.toLocaleString('fr-FR')} €</span></div>
    ${bebes>0?`<div class="calc-row"><span>Bébés (exclus CE 261)</span><span style="color:#9CA3AF">${bebes} × 0 €</span></div>`:''}
    <div class="calc-sep"></div>
    <div class="calc-row"><span>Commission Robin des Airs (25%)</span><span style="color:${f.comm>0?'#A32D2D':'inherit'}">− ${f.comm.toLocaleString('fr-FR')} €</span></div>
    <div class="calc-row"><span>Net Robin des Airs</span><span style="color:#0B1F3A">${f.comm.toLocaleString('fr-FR')} €</span></div>
    <div class="calc-sep"></div>
    <div class="calc-total"><span>Net client total</span><span style="color:#007A4C">${f.net.toLocaleString('fr-FR')} €</span></div>
    <div class="calc-note">Soit ${f.parPax.toLocaleString('fr-FR')} €/personne · + 40 € frais de recouvrement réclamés à la compagnie</div>
  </div>`;
}

let DB=[
  {id:'RDA-2026-001',statut:'PAYE',priorite:'STANDARD',date:'2026-01-15',date_paiement:'2026-01-28',source:'fb_reels',lrar:'2026-01-13',
   prenom:'Aminata',nom:'DIALLO',indicatif:'+33',tel:'6 12 34 56 78',email:'aminata@gmail.com',adultes:1,bebes:0,
   vols:[{comp:'Air France',vol:'AF 718',date:'2025-11-03',dep:'CDG',arr:'DSS',pnr:'AB4XYZ',inc:'RETARD'}],
   palier:600,events:[{date:'2026-01-10',action:'Mandat signé (YouSign)',meta:''},{date:'2026-01-12',action:'LRAR envoyée',meta:'Réf. AR 1A002'},{date:'2026-01-28',action:'Paiement reçu + reversé',meta:'600€ encaissés — 450€ reversés'}]},
  {id:'RDA-2026-002',statut:'LRAR_ENVOYEE',priorite:'HAUTE',date:'2026-02-01',date_paiement:null,source:'tiktok_ad',lrar:'2026-02-03',

function filtered(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const st=document.getElementById('filterStatut').value;
  const pal=document.getElementById('filterPalier').value;
  return DB.filter(d=>{
    const txt=(d.prenom+' '+d.nom+' '+d.vols[0].vol+' '+d.vols[0].pnr).toLowerCase();
    return(!q||txt.includes(q))&&(!st||d.statut===st)&&(!pal||d.palier===parseInt(pal));
  });
}

function renderMetrics(){
  const total=DB.length;
  const enCours=DB.filter(d=>!['PAYE','REFUSE_DEFINITIF','ABANDON','PRESCRIT'].includes(d.statut)).length;
  const payes=DB.filter(d=>d.statut==='PAYE').length;
  const caClient=DB.filter(d=>d.statut==='PAYE').reduce((s,d)=>s+calcFin(d.palier,d.adultes).net,0);
  const caRobin=DB.filter(d=>d.statut==='PAYE').reduce((s,d)=>s+calcFin(d.palier,d.adultes).comm,0);
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Total dossiers</div><div class="metric-val">${total}</div></div>
    <div class="metric"><div class="metric-label">En cours</div><div class="metric-val orange">${enCours}</div></div>
    <div class="metric"><div class="metric-label">Payés</div><div class="metric-val green">${payes}</div></div>
    <div class="metric"><div class="metric-label">Reversé clients</div><div class="metric-val green">${caClient.toLocaleString('fr-FR')} €</div></div>
    <div class="metric"><div class="metric-label">CA Robin des Airs</div><div class="metric-val navy">${caRobin.toLocaleString('fr-FR')} €</div></div>`;
}

function render(){
  renderMetrics();
  const rows=filtered();
  const tbody=document.getElementById('tbody');
  if(!rows.length){
    tbody.innerHTML='<tr><td colspan="9"><div class="empty-state"><p>Aucun dossier trouvé</p></div></td></tr>';
    return;
  }
  tbody.innerHTML=rows.map(d=>{
    const f=calcFin(d.palier,d.adultes);
    const m=calcMoratoire(d.lrar);
    let morCell='<span style="color:#9CA3AF;font-size:12px">—</span>';
    if(m){
      if(!m.actif) morCell=`<span class="moratoire-soon">J+16 le ${m.j16}</span>`;
      else morCell=`<span class="moratoire-pill">${m.jours}j · ${m.total} €</span>`;
    }
    const nbBadge=d.adultes+d.bebes>1?` <span style="font-size:11px;color:#9CA3AF">×${d.adultes+d.bebes}${d.bebes>0?` (${d.bebes}bb)`:''}</span>`:'';
    const volsBadge=d.vols.length>1?` <span style="font-size:10px;background:#DBEAFE;color:#1D4ED8;padding:1px 5px;border-radius:10px;font-weight:600">×${d.vols.length} vols</span>`:'';
    const statutCell=`<span class="badge s-${d.statut}">${STATUT_LABELS[d.statut]||d.statut}</span>${d.statut==='PAYE'&&d.date_paiement?`<div style="font-size:10px;color:#9CA3AF;margin-top:3px">${d.date_paiement}</div>`:''}`;
    return`<tr onclick="openDetail('${d.id}')">
      <td><div class="td-id">${d.id}</div><div class="td-sub">${d.date}</div></td>
      <td>${d.prenom} ${d.nom}${nbBadge}</td>
      <td>${d.vols[0].vol}${volsBadge}<div class="td-sub">${d.vols[0].dep} → ${d.vols[0].arr}</div></td>
      <td style="font-weight:700;color:${d.palier===600?'#007A4C':d.palier===400?'#1D4ED8':'#5F5E5A'}">${d.palier} €</td>
      <td><span style="font-weight:700;color:#007A4C">${f.net.toLocaleString('fr-FR')} €</span><div class="td-sub">${f.parPax.toLocaleString('fr-FR')} €/pers</div></td>
      <td style="font-weight:700;color:#0B1F3A">${f.comm.toLocaleString('fr-FR')} €</td>
      <td>${morCell}</td>
      <td>${statutCell}</td>
      <td class="prio-${d.priorite}">${d.priorite}</td>
    </tr>`;
  }).join('');
}

function openDetail(id){
  const d=DB.find(x=>x.id===id);
  if(!d)return;
  const f=calcFin(d.palier,d.adultes);
  const m=calcMoratoire(d.lrar);
  document.getElementById('detail-title').textContent=`${d.id} — ${d.prenom} ${d.nom}`;
  const moratoireHTML=m?`<div class="moratoire-box">
    <div class="moratoire-box-title">Indemnité moratoire de retard</div>
    ${!d.lrar?'<p style="font-size:12px;color:#92400E">LRAR non encore envoyée — renseigner la date de réception pour démarrer le compteur.</p>':
    !m.actif?`<p style="font-size:12px;color:#92400E">LRAR reçue le <b>${d.lrar}</b>. Intérêts légaux démarrent le <b>${m.j16}</b> (J+16).</p>
    <p style="font-size:12px;color:#92400E;margin-top:4px">Frais forfaitaires art. L.441-10 : <b>40 €</b> dus dès maintenant.</p>`:
    `<div class="calc-row"><span>Jours depuis J+16 (${m.j16})</span><span style="color:#92400E">${m.jours} jours</span></div>
    <div class="calc-row"><span>Intérêts légaux (6.65%/an)</span><span style="color:#92400E">calculés en temps réel</span></div>
    <div class="calc-row"><span>Forfait art. L.441-10</span><span style="color:#92400E">40,00 €</span></div>
    <div class="calc-sep"></div>
    <div class="calc-total" style="color:#92400E"><span>Total moratoire exigible</span><span>${m.total.toFixed(2)} €</span></div>`}
  </div>`:'';

  document.getElementById('detail-body').innerHTML=`
  <div class="tabs">
    <div class="tab active" onclick="switchTab(this,'t-info')">Dossier</div>
    <div class="tab" onclick="switchTab(this,'t-calc')">Calculs</div>
    <div class="tab" onclick="switchTab(this,'t-hist')">Historique</div>
    <div class="tab" onclick="switchTab(this,'t-upd')">Mettre à jour</div>
  </div>
  <div class="tab-content active" id="t-info">
    <div class="section-title">Passager principal</div>
    <div class="detail-row"><span class="detail-label">Nom complet</span><span class="detail-val">${d.prenom} ${d.nom}</span></div>
    <div class="detail-row"><span class="detail-label">Téléphone</span><span class="detail-val">${d.indicatif} ${d.tel}</span></div>
    <div class="detail-row"><span class="detail-label">E-mail</span><span class="detail-val">${d.email}</span></div>
    <div class="detail-row"><span class="detail-label">Adultes (indemnisés)</span><span class="detail-val">${d.adultes}</span></div>
    <div class="detail-row"><span class="detail-label">Bébés &lt; 2 ans (non indemnisés)</span><span class="detail-val">${d.bebes}</span></div>
    <div class="section-title">Vols (${d.vols.length})</div>
    ${d.vols.map((v,i)=>`<div style="border:1px solid #E2E4E8;border-radius:6px;padding:12px;margin-bottom:8px;background:#F7F8FA">
      <div style="font-size:11px;font-weight:700;color:#6B7280;margin-bottom:8px;text-transform:uppercase">VOL ${i+1}${i===d.vols.length-1?' — déterminant CE 261':''}</div>
      <div class="detail-row"><span class="detail-label">Vol</span><span class="detail-val">${v.comp} ${v.vol}</span></div>
      <div class="detail-row"><span class="detail-label">Date</span><span class="detail-val">${v.date}</span></div>
      <div class="detail-row"><span class="detail-label">Trajet</span><span class="detail-val">${v.dep} → ${v.arr}</span></div>
      <div class="detail-row" style="border:none"><span class="detail-label">PNR</span><span class="detail-val" style="font-family:monospace">${v.pnr}</span></div>
    </div>`).join('')}
    <div class="detail-row"><span class="detail-label">Source</span><span class="detail-val">${d.source}</span></div>
  </div>
  <div class="tab-content" id="t-calc">
    <div class="calc-box">
      <div class="calc-row"><span>Palier CE 261</span><span>${d.palier} € / passager</span></div>
      <div class="calc-row"><span>Adultes indemnisés</span><span>× ${d.adultes}</span></div>
      ${d.bebes>0?`<div class="calc-row"><span>Bébés (exclus CE 261)</span><span style="color:#9CA3AF">× ${d.bebes} = 0 €</span></div>`:''}
      <div class="calc-row"><span>Indemnité brute totale</span><span style="color:#007A4C">${f.brut.toLocaleString('fr-FR')} €</span></div>
      <div class="calc-sep"></div>
      <div class="calc-row"><span>Commission Robin des Airs (25%)</span><span style="color:#A32D2D">− ${f.comm.toLocaleString('fr-FR')} €</span></div>
      <div class="calc-row"><span style="font-weight:600">Net Robin des Airs</span><span style="color:#0B1F3A;font-size:15px">${f.comm.toLocaleString('fr-FR')} €</span></div>
      <div class="calc-sep"></div>
      <div class="calc-total"><span>Net client total</span><span style="color:#007A4C">${f.net.toLocaleString('fr-FR')} €</span></div>
      <div class="calc-note">Soit ${f.parPax.toLocaleString('fr-FR')} € par passager adulte</div>
    </div>
    ${moratoireHTML}
  </div>
  <div class="tab-content" id="t-hist">
    ${d.events.map(e=>`<div class="event-item"><div class="event-dot"></div><div><div class="event-text">${e.action}</div><div class="event-meta">${e.meta?e.meta+' · ':''}${e.date}</div></div></div>`).join('')}
    <div style="display:flex;gap:8px;margin-top:14px">
      <input id="ev-txt" style="flex:1;font-size:13px;padding:8px 11px;border-radius:6px;border:1px solid #E2E4E8;background:#fff;color:#1A1A2E;outline:none" placeholder="Ajouter un événement…" onkeydown="if(event.key==='Enter')addEvent('${id}')">
      <button class="btn btn-primary btn-sm" onclick="addEvent('${id}')">Ajouter</button>
    </div>
  </div>
  <div class="tab-content" id="t-upd">
    <div class="field"><label>Statut</label>
      <select id="upd-statut" onchange="togglePaiementField(this.value)">
        ${Object.entries(STATUT_LABELS).map(([k,v])=>`<option value="${k}"${k===d.statut?' selected':''}>${v}</option>`).join('')}
      </select>
    </div>
    <div id="paiement-field" style="${d.statut==='PAYE'?'':'display:none'}">
      <div class="field"><label>Date de paiement</label><input id="upd-date-paiement" type="date" value="${d.date_paiement||''}"></div>
    </div>
    <div class="field"><label>Date réception LRAR (démarre le compteur moratoire)</label><input id="upd-lrar" type="date" value="${d.lrar||''}"></div>
    <div class="field"><label>Priorité</label>
      <select id="upd-prio">
        ${['BASSE','STANDARD','HAUTE','URGENTE'].map(p=>`<option value="${p}"${p===d.priorite?' selected':''}>${p}</option>`).join('')}
      </select>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="updateDossier('${id}')">Enregistrer</button>
      <button class="btn btn-danger" onclick="genLettre('${id}')">Générer mise en demeure ↗</button>
    </div>
  </div>`;
  document.getElementById('modalDetail').style.display='flex';
}

function togglePaiementField(val){
  document.getElementById('paiement-field').style.display=val==='PAYE'?'block':'none';
}

function switchTab(el,id){
  el.closest('.modal-body').querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  el.closest('.modal-body').querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function addEvent(id){
  const d=DB.find(x=>x.id===id), txt=document.getElementById('ev-txt').value.trim();
  if(!d||!txt)return;
  d.events.push({date:today(),action:txt,meta:''});
  openDetail(id); render();
}

function updateDossier(id){
  const d=DB.find(x=>x.id===id); if(!d)return;
  d.statut=document.getElementById('upd-statut').value;
  d.priorite=document.getElementById('upd-prio').value;
  d.lrar=document.getElementById('upd-lrar').value||null;
  if(d.statut==='PAYE') d.date_paiement=document.getElementById('upd-date-paiement').value||today();
  d.events.push({date:today(),action:`Statut mis à jour → ${STATUT_LABELS[d.statut]}`,meta:''});
  render(); openDetail(id);
}

function genLettre(id){
  const d=DB.find(x=>x.id===id), f=calcFin(d.palier,d.adultes);
  alert(`Mise en demeure pour ${d.prenom} ${d.nom}\nVol ${d.vols[0].vol} — ${d.vols[0].dep}→${d.vols[0].arr}\n${d.adultes} passager(s) × ${d.palier}€ = ${f.brut}€ brut\nNet client : ${f.net}€ — Net Robin : ${f.comm}€\n\n→ Copier dans la mise en demeure Word.`);
}

function openNew(){
  initVolForm(); updateCalcNew();
  document.getElementById('modalNew').style.display='flex';
}

function saveNew(){
  const prenom=document.getElementById('n_prenom').value.trim();
  const nom=document.getElementById('n_nom').value.trim();
  if(!prenom||!nom){alert('Prénom et nom obligatoires');return;}
  const adultes=parseInt(document.getElementById('n_adultes').value)||1;
  const bebes=parseInt(document.getElementById('n_bebes').value)||0;
  const palier=parseInt(document.getElementById('n_palier').value)||600;
  const vols=[];
  for(let i=1;i<=volIdx;i++){
    const el=document.getElementById('vc'+i); if(!el)continue;
    vols.push({comp:document.getElementById('vc'+i+'_comp')?.value||'—',vol:document.getElementById('vc'+i+'_vol')?.value||'—',date:document.getElementById('vc'+i+'_date')?.value||'—',dep:(document.getElementById('vc'+i+'_dep')?.value||'').toUpperCase(),arr:(document.getElementById('vc'+i+'_arr')?.value||'').toUpperCase(),pnr:(document.getElementById('vc'+i+'_pnr')?.value||'').toUpperCase(),inc:document.getElementById('vc'+i+'_inc')?.value||'RETARD'});
  }
  const id='RDA-2026-0'+String(DB.length+1).padStart(2,'0');
  DB.unshift({id,statut:'ELIGIBLE',priorite:document.getElementById('n_priorite').value,date:today(),date_paiement:null,source:document.getElementById('n_source').value,lrar:null,prenom,nom,indicatif:document.getElementById('n_indicatif').value,tel:document.getElementById('n_tel').value,email:document.getElementById('n_email').value,adultes,bebes,vols,palier,events:[{date:today(),action:'Dossier créé — Éligible',meta:''}]});
  closeAll(); render();
}

function closeAll(){
  document.getElementById('modalNew').style.display='none';
  document.getElementById('modalDetail').style.display='none';
}

render();
</script>
