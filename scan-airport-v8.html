<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBIN V9.0 — SURGICAL SNIPER</title>
    <style>
        :root { --red: #ff4d4d; --green: #2ecc71; --blue: #3498db; --orange: #f39c12; --bg: #050505; --card: #111; --border: #222; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* Dashboard Compact pour éviter le crash mobile */
        .top-container { position: sticky; top: 0; z-index: 1000; background: rgba(5,5,5,0.95); backdrop-filter: blur(10px); padding: 10px 15px; border-bottom: 2px solid var(--border); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .log-status { font-size: 10px; font-family: monospace; color: var(--orange); background: #000; padding: 4px 8px; border-radius: 4px; flex-grow: 1; margin: 0 15px; border: 1px solid #333; }

        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .stat-card { background: var(--card); padding: 8px; border-radius: 6px; border: 1px solid var(--border); text-align: center; }
        .stat-value { font-size: 18px; font-weight: 900; display: block; }
        .stat-label { font-size: 9px; color: #666; text-transform: uppercase; }

        /* Table Optimisée */
        .table-container { padding: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #1a1a1a; color: #555; padding: 10px; text-align: left; text-transform: uppercase; font-size: 9px; letter-spacing: 1px; }
        td { padding: 12px 10px; border-bottom: 1px solid #1a1a1a; }

        .critique { background: rgba(255, 77, 77, 0.12) !important; border-left: 3px solid var(--red); }
        .badge-cash { background: var(--green); color: #000; padding: 3px 6px; border-radius: 4px; font-weight: 900; font-size: 10px; }
        .btn-scan { background: var(--red); color: white; border: none; padding: 8px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; }

        .airline-img { width: 20px; height: 20px; vertical-align: middle; margin-right: 8px; background: white; border-radius: 2px; padding: 1px; }
    </style>
</head>
<body>

<div class="top-container">
    <div class="header">
        <div style="font-size:18px; font-weight:900; color:var(--red);">🏹 ROBIN V9.0</div>
        <div id="status-log" class="log-status">SYSTÈME PRÊT...</div>
        <button class="btn-scan" onclick="lancerScan()">🔄 SCAN</button>
    </div>
    <div class="dashboard">
        <div class="stat-card" style="border-bottom: 2px solid var(--red);"><span id="count-crit" class="stat-value">0</span><span class="stat-label">Cibles</span></div>
        <div class="stat-card" style="border-bottom: 2px solid var(--green);"><span id="total-cash" class="stat-value" style="color:var(--green)">0€</span><span class="stat-label">Potentiel</span></div>
        <div class="stat-card" style="border-bottom: 2px solid var(--blue);"><span id="total-vols" class="stat-value">0</span><span class="stat-label">Vols</span></div>
        <div class="stat-card" style="border-bottom: 2px solid var(--orange);"><span id="scan-time" class="stat-value">--:--</span><span class="stat-label">Update</span></div>
    </div>
</div>

<div class="table-container">
    <table id="main-table">
        <thead>
            <tr>
                <th>Vol</th>
                <th>Trajet</th>
                <th>Réel</th>
                <th>Retard</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="flight-list">
            <tr><td colspan="5" style="text-align:center; padding:50px; color:#444;">Lancez le scan chirurgical...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // Sécurité Stealth Netlify
    const p1 = "ea71e3"; const p2 = "c99347"; const API_KEY = p1 + "-" + p2;

    // Configuration Chirurgicale
    const HUBS = ['CDG','ORY','DSS','ABJ','BKO','CKY','OUA','LFW','ACC','DLA','NSI','LBV','FIH','RAK','CMN','TUN','ALG'];
    const AIRLINES = ['AF','SN','KL','AT','HC','TU','AH','ET','TO','VY'];
    const AFRICA = ['DSS','DKR','ABJ','BKO','CKY','OUA','LFW','ACC','LOS','COO','NKC','NIM','FNA','DLA','NSI','LBV','FIH','NDJ','RAK','CMN','ALG','TUN','AGA','FEZ'];

    let masterList = [];

    function extractFlights(data) {
        if (!data) return [];
        if (data.error) return [];
        if (Array.isArray(data)) return data;
        return data.data || data.response || [];
    }

    function formatTime(iso) {
        if (!iso || typeof iso !== 'string') return '--:--';
        const t = iso.split('T')[1];
        return t ? t.substring(0, 5) : '--:--';
    }

    async function lancerScan() {
        const listBody = document.getElementById('flight-list');
        const log = document.getElementById('status-log');

        masterList = [];
        listBody.innerHTML = "";
        updateStats(0, 0, 0);

        for (const hub of HUBS) {
            log.innerText = "📡 SCANNING " + hub + "...";
            log.style.color = "var(--orange)";

            try {
                const response = await fetch("https://aviation-edge.com/v2/public/timetable?key=" + API_KEY + "&iataCode=" + hub + "&type=arrival&_=" + Date.now());
                const data = await response.json();
                const raw = extractFlights(data);

                const filtered = raw.filter(f => {
                    if (!f || !f.airline || !f.departure || !f.arrival) return false;
                    const dep = (f.departure.iataCode || '').toUpperCase();
                    const arr = (f.arrival.iataCode || '').toUpperCase();
                    const isAirlines = AIRLINES.includes((f.airline.iataCode || '').toUpperCase());
                    const isAfrica = AFRICA.includes(dep) || AFRICA.includes(arr);
                    return isAirlines && isAfrica;
                });

                masterList = masterList.concat(filtered);
                renderFlights();
            } catch (e) {
                console.error("Erreur sur " + hub);
            }

            await new Promise(resolve => setTimeout(resolve, 200));
        }

        log.innerText = "🏁 SCAN TERMINÉ - CIBLES IDENTIFIÉES";
        log.style.color = "var(--green)";
        document.getElementById('scan-time').innerText = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    }

    function renderFlights() {
        const listBody = document.getElementById('flight-list');

        const seen = new Map();
        masterList.forEach(f => {
            const num = (f.flight && f.flight.iataNumber) || (f.flight && f.flight.icaoNumber) || '';
            const key = num + "_" + (f.departure && f.departure.iataCode) + "_" + (f.arrival && f.arrival.iataCode) + "_" + (f.arrival && f.arrival.scheduledTime);
            if (!seen.has(key)) seen.set(key, f);
        });
        const unique = Array.from(seen.values()).sort((a, b) => (Number(b.arrival && b.arrival.delay) || 0) - (Number(a.arrival && a.arrival.delay) || 0));

        let html = "";
        let crits = 0;

        unique.slice(0, 60).forEach(f => {
            const delay = Number(f.arrival && f.arrival.delay) || 0;
            const status = (f.status || '').toLowerCase();
            const isCrit = delay >= 180 || status === 'cancelled';
            if (isCrit) crits++;

            const timeShort = formatTime(f.arrival && (f.arrival.actualTime || f.arrival.estimatedTime));
            const num = (f.flight && f.flight.iataNumber) || (f.flight && f.flight.icaoNumber) || '--';
            const cie = (f.airline && f.airline.iataCode) || '';
            const dep = (f.departure && f.departure.iataCode) || '?';
            const arr = (f.arrival && f.arrival.iataCode) || '?';

            html += "<tr class=\"" + (isCrit ? "critique" : "") + "\"><td><img class=\"airline-img\" src=\"https://www.gstatic.com/flights/airline_logos/70px/" + cie + ".png\" onerror=\"this.style.display='none'\"><b>" + num + "</b></td><td><small>" + dep + "</small>➔<b>" + arr + "</b></td><td>" + timeShort + "</td><td style=\"color:" + (delay > 0 ? "var(--orange)" : "inherit") + "\"><b>" + delay + " min</b></td><td>" + (isCrit ? "<span class=\"badge-cash\">600€ 🏹</span>" : "--") + "</td></tr>";
        });

        listBody.innerHTML = html;
        updateStats(crits, unique.length, crits * 9600);
    }

    function updateStats(crits, total, cash) {
        document.getElementById('count-crit').innerText = crits;
        document.getElementById('total-vols').innerText = total;
        document.getElementById('total-cash').innerText = cash.toLocaleString() + "€";
    }

    window.onload = lancerScan;
</script>
</body>
</html>
