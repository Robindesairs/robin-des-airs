<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBIN V8.4 - RÉPARATION FINALE</title>
    <style>
        :root { --red: #ff4d4d; --green: #2ecc71; --bg: #050505; --card: #111; --border: #222; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .top-container { position: sticky; top: 0; z-index: 1000; background: var(--bg); padding: 15px 20px; border-bottom: 2px solid var(--border); }
        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .stat-card { background: var(--card); padding: 12px; border-radius: 8px; border: 1px solid var(--border); text-align: center; }
        .api-msg { font-size: 11px; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-left: 10px; }
        .status-ok { background: rgba(46, 204, 113, 0.1); color: var(--green); border: 1px solid var(--green); }
        .status-warn { background: rgba(255, 77, 77, 0.1); color: var(--red); border: 1px solid var(--red); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #1a1a1a; color: #666; padding: 12px; text-align: left; text-transform: uppercase; font-size: 10px; }
        td { padding: 15px 12px; border-bottom: 1px solid #1a1a1a; }
        .btn-scan { background: var(--red); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="top-container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="font-size:22px; font-weight:900; color:var(--red);">🏹 ROBIN V8.4</div>
        <div id="api-status" class="api-msg status-ok">PRÊT</div>
        <button class="btn-scan" onclick="lancerScan()">🔄 SCAN LIVE</button>
    </div>
    <div class="dashboard">
        <div class="stat-card"><span id="count-critical" style="font-size:20px; font-weight:900;">0</span><br><small>CRITIQUES</small></div>
        <div class="stat-card"><span id="total-vols" style="font-size:20px; font-weight:900;">0</span><br><small>VOLS</small></div>
        <div class="stat-card"><span id="total-cash" style="font-size:20px; font-weight:900; color:var(--green)">0 €</span><br><small>CASH</small></div>
        <div class="stat-card"><span id="live-time" style="font-size:20px; font-weight:900;">--:--</span><br><small>SCAN</small></div>
    </div>
</div>

<div style="padding: 20px;">
    <table>
        <thead>
            <tr><th>Vol</th><th>Trajet</th><th>Status</th><th>Retard</th><th>Potentiel</th></tr>
        </thead>
        <tbody id="flight-list">
            <tr><td colspan="5" style="text-align:center; padding:80px; color:#444;">Cliquez sur SCAN LIVE pour démarrer.</td></tr>
        </tbody>
    </table>
</div>

<script>
    // Camouflage pour Netlify
    const k1 = "ea71e3";
    const k2 = "c99347";
    const API_KEY = k1 + "-" + k2;

    const HUBS = ['CDG','ORY','DSS','ABJ','BKO','CKY','OUA']; // Liste réduite pour le test
    const AIRLINES = ['AF','SN','KL','HC','AT'];

    async function lancerScan() {
        const list = document.getElementById('flight-list');
        const statusBox = document.getElementById('api-status');
        list.innerHTML = "<tr><td colspan='5' style='text-align:center; padding:80px;'>Analyse en cours...</td></tr>";

        try {
            const url = `https://aviation-edge.com/v2/public/timetable?key=${API_KEY}&iataCode=CDG&type=arrival`;
            const response = await fetch(url);
            const data = await response.json();

            // VÉRIFICATION RÉELLE DE L'ERREUR
            if (data.error) {
                statusBox.innerText = "ERREUR API : " + data.error;
                statusBox.className = "api-msg status-warn";
                list.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:80px; color:var(--red);">
                    <b>L'API a répondu :</b><br>${data.error}<br><br>
                    <small>Vérifiez que votre clé est active ou que le service n'est pas en maintenance.</small>
                </td></tr>`;
                return;
            }

            statusBox.innerText = "✅ API CONNECTÉE";
            statusBox.className = "api-msg status-ok";

            // Si c'est un tableau, on continue
            const raw = Array.isArray(data) ? data : (data.data || data.response || []);
            const filtered = raw.filter(f => f && f.airline && AIRLINES.includes((f.airline.iataCode || '').toUpperCase()));

            list.innerHTML = "";
            let crits = 0;

            if (filtered.length === 0) {
                list.innerHTML = "<tr><td colspan='5' style='text-align:center; padding:80px;'>Aucun vol critique trouvé sur CDG.</td></tr>";
            }

            filtered.forEach(f => {
                const delay = Number(f.arrival && f.arrival.delay) || 0;
                const isCrit = delay >= 180;
                if(isCrit) crits++;
                const num = (f.flight && f.flight.iataNumber) || (f.flight && f.flight.icaoNumber) || '--';
                const dep = (f.departure && f.departure.iataCode) || '?';
                const arr = (f.arrival && f.arrival.iataCode) || '?';
                const status = (f.status || '').toUpperCase();
                list.innerHTML += `<tr style="${isCrit ? 'background:rgba(255,77,77,0.08)' : ''}">
                    <td><b>${num}</b></td>
                    <td>${dep} ➔ ${arr}</td>
                    <td>${status}</td>
                    <td style="color:${isCrit ? 'var(--red)' : 'inherit'}"><b>${delay} min</b></td>
                    <td style="color:var(--green); font-weight:900;">${isCrit ? '9 600€ 🏹' : '--'}</td>
                </tr>`;
            });

            document.getElementById('count-critical').innerText = crits;
            document.getElementById('total-vols').innerText = filtered.length;
            document.getElementById('total-cash').innerText = (crits * 9600).toLocaleString() + " €";
            document.getElementById('live-time').innerText = new Date().toLocaleTimeString();

        } catch (e) {
            statusBox.innerText = "ERREUR RÉSEAU";
            statusBox.className = "api-msg status-warn";
        }
    }
</script>
</body>
</html>
