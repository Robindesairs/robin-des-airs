<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBIN DES AIRS — V8.1 DIRECT HIT</title>
    <style>
        :root { --red: #ff4d4d; --green: #2ecc71; --blue: #3498db; --orange: #f39c12; --bg: #050505; --card: #111; --border: #222; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .top-container { position: sticky; top: 0; z-index: 1000; background: var(--bg); padding: 15px 20px; border-bottom: 2px solid var(--border); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo-main { font-size: 22px; font-weight: 900; color: var(--red); letter-spacing: 1px; }
        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .stat-card { background: var(--card); padding: 12px; border-radius: 8px; border: 1px solid var(--border); text-align: center; }
        .stat-value { font-size: 22px; font-weight: 900; display: block; }
        .btn-refresh { background: var(--red); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .table-container { padding: 20px; }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; }
        thead th { position: sticky; top: 145px; z-index: 900; background: #1a1a1a; color: #888; padding: 12px; font-size: 10px; text-transform: uppercase; text-align: left; border-bottom: 2px solid var(--border); }
        tbody td { padding: 12px; border-bottom: 1px solid #1a1a1a; vertical-align: middle; }
        .badge-600 { background: var(--green); color: black; padding: 5px 10px; border-radius: 4px; font-weight: 900; font-size: 11px; animation: blink 1.2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .btn-copy { cursor: pointer; background: #333; color: white; border: none; padding: 6px 10px; border-radius: 4px; font-size: 14px; }
        .toast { position: fixed; bottom: 25px; right: 25px; background: var(--green); color: black; padding: 12px 20px; border-radius: 8px; font-weight: 900; z-index: 3000; }
    </style>
</head>
<body>

<div class="top-container">
    <div class="header">
        <div class="logo-main">🏹 ROBIN DES AIRS <span style="font-size: 11px; font-weight: 400; color: #666;">| V8.1 DIRECT HIT</span></div>
        <button class="btn-refresh" onclick="lancerScan()">🔄 SCAN LIVE AIRPORT</button>
    </div>
    <div class="dashboard">
        <div class="stat-card" style="border-top: 3px solid var(--red);"><span id="count-critical" class="stat-value">0</span><span style="font-size:10px;color:#666">CRITIQUES (+3H)</span></div>
        <div class="stat-card" style="border-top: 3px solid var(--green);"><span id="total-cash" class="stat-value" style="color:var(--green)">0 €</span><span style="font-size:10px;color:#666">POTENTIEL CASH</span></div>
        <div class="stat-card" style="border-top: 3px solid var(--blue);"><span id="total-vols" class="stat-value">0</span><span style="font-size:10px;color:#666">VOLS FILTRÉS</span></div>
        <div class="stat-card" style="border-top: 3px solid var(--orange);"><span id="live-time" class="stat-value">--:--</span><span style="font-size:10px;color:#666">UTC (Z)</span></div>
    </div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Vol / Op</th>
                <th>Immat</th>
                <th>Trajet</th>
                <th>Décollage</th>
                <th>Arrivée</th>
                <th>Statut</th>
                <th>Retard</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="flight-list">
            <tr><td colspan="9" style="text-align:center; padding:100px; color:#555;">En attente du signal de la tour...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const accessCode = "robin-dakar";
    const API_KEY = "ea71e3-c99347";

    if (sessionStorage.getItem('auth_v8') !== 'granted') {
        if (prompt("Accès Admin :") === accessCode) sessionStorage.setItem('auth_v8', 'granted');
        else window.location.href = "https://google.com";
    }

    const HUBS = ['CDG','ORY','BRU','AMS','LIS','DSS','ABJ','BKO','CKY','OUA','LFW','ACC','ABV','LOS','COO','NKC','NIM','FNA','ROB','DLA','NSI','LBV','FIH','BZV','PNR','BGF','LAD','SSG','NDJ','NBO','DAR','ADD','JNB','CPT','KGL','JIB','ZNZ','TNR','MRU','RUN','DZA'];
    const AIRLINES = ['AF','SN','KL','LH','TP','IB','BA','VY','TO'];

    function formatT(iso) {
        if(!iso) return "--:--";
        return iso.split('T')[1].substring(0,5);
    }

    function formatD(iso) {
        if(!iso) return "--";
        return iso.split('T')[0].replace(/-/g,'/');
    }

    function copier(txt) {
        navigator.clipboard.writeText(txt).then(() => {
            const t = document.createElement('div'); t.className='toast'; t.innerText="✅ CIBLE COPIÉE";
            document.body.appendChild(t); setTimeout(()=>t.remove(), 2000);
        });
    }

    function estimerIndemnite(dep, arr) {
        const longHaul = ['DSS','ABJ','BKO','CKY','OUA','LFW','ACC','ABV','LOS','COO','NKC','NIM','FNA','DLA','NSI','LBV','FIH','BZV','PNR','BGF','LAD','SSG','NDJ','NBO','DAR','ADD','JNB','CPT','KGL','JIB','ZNZ','TNR','MRU','RUN','DZA'];
        const depLong = longHaul.includes(String(dep).toUpperCase());
        const arrLong = longHaul.includes(String(arr).toUpperCase());
        if (depLong || arrLong) return 600;
        return 400;
    }

    function updateLiveTime() {
        const now = new Date();
        const utc = now.toISOString().substring(11, 16);
        const el = document.getElementById('live-time');
        if (el) el.textContent = utc;
    }
    setInterval(updateLiveTime, 1000);
    updateLiveTime();

    async function lancerScan() {
        const list = document.getElementById('flight-list');
        list.innerHTML = "<tr><td colspan='9' style='text-align:center; padding:100px; color:var(--orange); font-weight:bold;'>🔄 SYNCHRONISATION EN COURS...</td></tr>";

        try {
            const calls = HUBS.map(h => fetch(`https://aviation-edge.com/v2/public/timetable?key=${API_KEY}&iataCode=${h}&type=arrival&_=${Date.now()}`).then(r => r.json()).catch(() => []));
            const results = await Promise.all(calls);
            const raw = results.flat().filter(f => f && f.airline && AIRLINES.includes(f.airline.iataCode));

            const unique = new Map();
            raw.forEach(f => {
                const key = `${f.arrival.scheduledTime}_${f.departure.iataCode}_${f.arrival.iataCode}`;
                if (!unique.has(key) || (f.aircraft && f.aircraft.regNumber)) unique.set(key, f);
            });

            const arr = Array.from(unique.values());
            const delayMin = f => (f.arrival && f.arrival.delay != null) ? Number(f.arrival.delay) : 0;
            const critiques = arr.filter(f => delayMin(f) >= 180);
            const triees = critiques.slice().sort((a,b) => (a.arrival.scheduledTime || '').localeCompare(b.arrival.scheduledTime || ''));

            let totalCash = 0;
            triees.forEach(f => { totalCash += estimerIndemnite(f.departure.iataCode, f.arrival.iataCode); });

            document.getElementById('count-critical').textContent = critiques.length;
            document.getElementById('total-cash').textContent = totalCash + ' €';
            document.getElementById('total-vols').textContent = arr.length;

            if (triees.length === 0) {
                list.innerHTML = "<tr><td colspan='9' style='text-align:center; padding:60px; color:#666;'>Aucun vol critique (+3h) pour le moment.</td></tr>";
                return;
            }

            list.innerHTML = triees.map(f => {
                const vol = (f.flight && f.flight.iataNumber) ? f.flight.iataNumber : (f.flight && f.flight.icaoNumber) ? f.flight.icaoNumber : '—';
                const op = f.airline ? f.airline.iataCode : '—';
                const immat = (f.aircraft && f.aircraft.regNumber) ? f.aircraft.regNumber : '—';
                const trajet = `${f.departure.iataCode || '?'} → ${f.arrival.iataCode || '?'}`;
                const depT = formatT(f.departure.scheduledTime);
                const arrT = formatT(f.arrival.scheduledTime);
                const statut = (f.status && f.status !== 'scheduled') ? String(f.status) : 'arrival';
                const retard = delayMin(f) >= 180 ? '+' + Math.floor(delayMin(f)/60) + 'h' : '—';
                const indemnite = estimerIndemnite(f.departure.iataCode, f.arrival.iataCode);
                const cible = `${vol} ${trajet} ${formatD(f.arrival.scheduledTime)}`;
                return `<tr>
                    <td>${formatD(f.arrival.scheduledTime)}</td>
                    <td>${vol} / ${op}</td>
                    <td>${immat}</td>
                    <td>${trajet}</td>
                    <td>${depT}</td>
                    <td>${arrT}</td>
                    <td>${statut}</td>
                    <td>${retard}</td>
                    <td><span class="badge-600">${indemnite}€</span> <button class="btn-copy" onclick="copier('${cible.replace(/'/g, "\\'")}')">📋</button></td>
                </tr>`;
            }).join('');
        } catch (err) {
            list.innerHTML = "<tr><td colspan='9' style='text-align:center; padding:60px; color:var(--red);'>Erreur réseau ou API.</td></tr>";
            console.error(err);
        }
    }

    lancerScan();
</script>
</body>
</html>
