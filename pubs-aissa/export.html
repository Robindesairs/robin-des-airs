  <script type="text/babel" data-presets="react" data-source="pub/ad-brand.jsx">
// Robin des Airs — Meta Ads atoms (flat fintech charter)
// Flat, premium-minimal · solid green / navy starry · DM Sans.
// 9:16 · 1080×1920, Meta safe zones. Target: Afrique → Europe passengers.

const { useMemo: useMemoAd } = React;

// ─── Palette ───────────────────────────────────────────────
const AD = {
  green:     '#00C896',
  greenDeep: '#00B085',
  greenDark: '#009E78',
  navy:      '#1A1F36',
  navyDeep:  '#0B0F1A',
  red:       '#E53935',
  redDeep:   '#C62828',
  white:     '#FFFFFF',
  whatsapp:  '#25D366',
  phone:     '+33 7 56 86 36 30',
  url:       'robindesairs.eu',
  font:      '"DM Sans", system-ui, -apple-system, sans-serif',
};

// Meta safe zones. Top/side 80px; bottom ~196px reserved for native button.
const SAFE = { top: 88, side: 92, bottom: 188 };

// ─── Seeded RNG + Starfield (shared navy "nuit étoilée") ───
function adSeed(n) {
  let s = n >>> 0;
  return () => {
    s += 0x6D2B79F5;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function Starfield({ density = 70, seed = 7, accent = AD.green }) {
  const stars = useMemoAd(() => {
    const r = adSeed(seed);
    return Array.from({ length: density }, () => {
      const size = 0.8 + r() * 2.6;
      return {
        x: r() * 100, y: r() * 100, size,
        opacity: 0.18 + r() * 0.5,
        tinted: r() > 0.9,
      };
    });
  }, [density, seed]);
  return (
    <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none', overflow: 'hidden' }}>
      {stars.map((s, i) => (
        <div key={i} style={{
          position: 'absolute', left: `${s.x}%`, top: `${s.y}%`,
          width: s.size, height: s.size, borderRadius: '50%',
          background: s.tinted ? accent : '#fff', opacity: s.opacity,
          boxShadow: s.size > 2 ? `0 0 ${s.size * 3}px ${s.tinted ? accent : 'rgba(255,255,255,0.6)'}` : 'none',
        }}/>
      ))}
    </div>
  );
}

// ─── Flight arc Afrique → Europe (abstract: 2 nodes + curve) ─
// variant 'bg'   → faint, decorative, fills frame behind content
// variant 'hero' → prominent central graphic with A/B labels
function FlightArc({ variant = 'bg', labels = false, accent = AD.green,
                     labelA = 'Afrique', labelB = 'Europe', plane = false }) {
  const faint = variant === 'bg';
  const stroke = faint ? `${accent}55` : accent;
  // path from lower-left node to upper-right node, in a 1080×620 space
  const A = { x: 130, y: 500 }, B = { x: 950, y: 170 };
  const C = { x: 560, y: 92 }; // control
  const d = `M ${A.x} ${A.y} Q ${C.x} ${C.y} ${B.x} ${B.y}`;
  return (
    <svg viewBox="0 0 1080 620" width="100%" height="100%" preserveAspectRatio="xMidYMid meet"
      style={{ display: 'block', overflow: 'visible' }} aria-hidden="true">
      <path d={d} fill="none" stroke={stroke}
        strokeWidth={faint ? 2 : 3.5} strokeDasharray="3 14" strokeLinecap="round"/>
      {/* node A */}
      <circle cx={A.x} cy={A.y} r={faint ? 7 : 11} fill={accent}/>
      <circle cx={A.x} cy={A.y} r={faint ? 16 : 24} fill="none" stroke={accent} strokeWidth="1.5" opacity="0.5"/>
      {/* node B */}
      <circle cx={B.x} cy={B.y} r={faint ? 7 : 11} fill={accent}
        style={{ filter: faint ? 'none' : `drop-shadow(0 0 10px ${accent})` }}/>
      <circle cx={B.x} cy={B.y} r={faint ? 16 : 24} fill="none" stroke={accent} strokeWidth="1.5" opacity="0.5"/>
      {plane && (
        <g transform={`translate(${C.x - 6} ${C.y + 30}) rotate(-30)`}>
          <path d="M0 7 L30 0 L0 -7 L8 0 Z" fill={accent}
            style={{ filter: `drop-shadow(0 0 8px ${accent})` }}/>
        </g>
      )}
      {labels && (
        <>
          <text x={A.x} y={A.y + 54} fill="rgba(255,255,255,0.78)"
            fontFamily={AD.font} fontSize="32" fontWeight="600"
            letterSpacing="1" textAnchor="middle">{labelA}</text>
          <text x={B.x} y={B.y - 40} fill="rgba(255,255,255,0.92)"
            fontFamily={AD.font} fontSize="32" fontWeight="700"
            letterSpacing="1" textAnchor="middle">{labelB}</text>
        </>
      )}
    </svg>
  );
}

// ─── Clock filigree (simple geometric: circle + ticks + hands) ─
function ClockGlyph({ size = 480, color = '#fff', style }) {
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" fill="none" style={style} aria-hidden="true">
      <circle cx="50" cy="50" r="44" stroke={color} strokeWidth="1.4"/>
      <circle cx="50" cy="50" r="2.2" fill={color}/>
      {Array.from({ length: 12 }, (_, i) => {
        const a = (i / 12) * Math.PI * 2;
        const r1 = 44, r2 = i % 3 === 0 ? 38 : 40.5;
        return <line key={i}
          x1={50 + Math.sin(a) * r1} y1={50 - Math.cos(a) * r1}
          x2={50 + Math.sin(a) * r2} y2={50 - Math.cos(a) * r2}
          stroke={color} strokeWidth={i % 3 === 0 ? 1.6 : 0.9}/>;
      })}
      <line x1="50" y1="50" x2="50" y2="26" stroke={color} strokeWidth="2.4" strokeLinecap="round"/>
      <line x1="50" y1="50" x2="69" y2="59" stroke={color} strokeWidth="2.4" strokeLinecap="round"/>
    </svg>
  );
}

// ─── Minimal plane glyph (outline, geometric) ──────────────
function PlaneGlyph({ size = 30, color = '#fff', style }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" style={style} aria-hidden="true">
      <path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L11 19v-5.5L21 16z"
        fill="none" stroke={color} strokeWidth="1.4" strokeLinejoin="round"/>
    </svg>
  );
}

// ─── WhatsApp glyph ────────────────────────────────────────
function WAGlyph({ size = 40, color = AD.green }) {
  return (
    <svg width={size} height={size} viewBox="0 0 32 32" fill="none" aria-hidden="true">
      <path d="M16 3C8.8 3 3 8.8 3 16c0 2.4.7 4.7 1.9 6.7L3 29l6.5-1.8c1.9 1 4.2 1.6 6.5 1.6 7.2 0 13-5.8 13-13S23.2 3 16 3z" fill={color}/>
      <path d="M11.5 9.2c-.3-.7-.6-.7-.9-.7h-.7c-.3 0-.7.1-1.1.5-.4.4-1.4 1.4-1.4 3.3 0 1.9 1.4 3.8 1.6 4.1.2.3 2.8 4.4 6.8 6 3.4 1.3 4 1 4.7.9.7-.1 2.3-.9 2.6-1.9.3-.9.3-1.7.2-1.9-.1-.2-.4-.3-.8-.5-.4-.2-2.3-1.1-2.7-1.3-.4-.1-.6-.2-.9.2-.3.4-1 1.3-1.3 1.5-.2.3-.5.3-.8.1-.4-.2-1.6-.6-3-1.8-1.1-1-1.9-2.2-2.1-2.5-.2-.4 0-.6.2-.8l.6-.7c.2-.2.3-.4.4-.6.1-.3.1-.5 0-.7-.1-.2-.9-2.2-1.2-2.9z" fill="#fff"/>
    </svg>
  );
}

// ─── Mandatory Meta filter pill (on every creative) ────────
// "Vol vers l'Europe — retard ou annulation ?" — pre-qualifies the audience.
function FilterPill({ tone = 'dark', label }) {
  const light = tone === 'light'; // on green bg
  const text = label || 'Vol vers l’Europe — retard ou annulation\u202f?';
  return (
    <div style={{
      display: 'inline-flex', alignItems: 'center', gap: 14,
      padding: '16px 28px', borderRadius: 999,
      border: `1.5px solid ${light ? 'rgba(255,255,255,0.55)' : 'rgba(255,255,255,0.22)'}`,
      background: light ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.05)',
      maxWidth: '100%',
    }}>
      <PlaneGlyph size={26} color={light ? '#fff' : AD.green}/>
      <span style={{
        fontFamily: AD.font, fontWeight: 600, fontSize: 30,
        letterSpacing: -0.2, color: light ? '#fff' : 'rgba(255,255,255,0.94)',
        whiteSpace: 'nowrap',
      }}>{text}</span>
    </div>
  );
}

// ─── WhatsApp CTA pill ─────────────────────────────────────
function WhatsAppPill({ label, variant = 'white', sub }) {
  const isWhite = variant === 'white';
  const bg = isWhite ? AD.white : AD.green;
  const fg = isWhite ? AD.greenDark : AD.white;
  const glyphCircle = isWhite ? AD.green : AD.white;
  const glyphColor = isWhite ? '#fff' : AD.green;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 20 }}>
      <div style={{
        display: 'inline-flex', alignItems: 'center', gap: 22,
        padding: '32px 50px', borderRadius: 999, background: bg,
        boxShadow: isWhite ? '0 24px 60px rgba(0,0,0,0.20)' : `0 24px 60px ${AD.green}55`,
      }}>
        <span style={{
          width: 60, height: 60, borderRadius: '50%', background: glyphCircle,
          display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
        }}>
          <WAGlyph size={36} color={glyphColor}/>
        </span>
        <span style={{
          fontFamily: AD.font, fontWeight: 700, fontSize: 42,
          color: fg, letterSpacing: -0.5, whiteSpace: 'nowrap',
        }}>{label}</span>
      </div>
      {sub && (
        <span style={{
          fontFamily: AD.font, fontWeight: 500, fontSize: 25,
          color: isWhite ? 'rgba(255,255,255,0.85)' : 'rgba(255,255,255,0.7)',
          letterSpacing: 0.2, textAlign: 'center',
        }}>{sub}</span>
      )}
    </div>
  );
}

// ─── Logo wordmark (discret) ───────────────────────────────
function AdLogo({ color = '#fff', mark = AD.green, upper = false }) {
  return (
    <div style={{
      display: 'inline-flex', alignItems: 'center', gap: 13,
      fontFamily: AD.font, fontWeight: upper ? 700 : 600,
      fontSize: upper ? 26 : 30, color,
      letterSpacing: upper ? 1.5 : -0.2,
      textTransform: upper ? 'uppercase' : 'none',
    }}>
      <span style={{
        width: 38, height: 38, borderRadius: 11, background: mark, color: AD.navy,
        display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 21, lineHeight: 1,
      }}>🏹</span>
      {upper ? <span>Robin des Airs</span>
             : <span>Robin <span style={{ opacity: 0.65 }}>des Airs</span></span>}
    </div>
  );
}

// ─── Ad frame — 1080×1920 with Meta safe zones ─────────────
function AdFrame({ bg, children, footer, header,
                   starfield = false, starSeed = 7, arc = null, decor = null,
                   logoUpper = false }) {
  return (
    <div style={{
      width: 1080, height: 1920, position: 'relative',
      background: bg, overflow: 'hidden', fontFamily: AD.font, color: AD.white,
    }}>
      {starfield && <Starfield seed={starSeed}/>}
      {decor}
      {arc && (
        <div style={{
          position: 'absolute', left: 0, right: 0, top: '16%', height: '46%',
          opacity: arc.variant === 'bg' ? 0.55 : 1, zIndex: 1, pointerEvents: 'none',
        }}>
          <FlightArc {...arc}/>
        </div>
      )}

      <div style={{
        position: 'absolute', inset: 0,
        paddingTop: SAFE.top, paddingBottom: 132,
        paddingLeft: SAFE.side, paddingRight: SAFE.side,
        display: 'flex', flexDirection: 'column', zIndex: 3,
      }}>
        {/* mandatory Meta filter pill, centered at top */}
        {header && (
          <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 4 }}>{header}</div>
        )}

        {children}

        {/* footer region pinned to bottom: CTA + discreet logo, clears the
            ~120px reserved Meta "Send message" button zone */}
        <div style={{
          marginTop: 'auto', display: 'flex', flexDirection: 'column',
          alignItems: 'center', gap: 30,
        }}>
          {footer}
          <AdLogo upper={logoUpper}/>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, {
  AD, SAFE, Starfield, FlightArc, PlaneGlyph, ClockGlyph, WAGlyph,
  FilterPill, WhatsAppPill, AdLogo, AdFrame,
});
  </script>

  <script type="text/babel" data-presets="react" data-source="pub/ads.jsx">
// Robin des Airs — 5 Meta Story ad creatives (1080×1920)
// Afrique → Europe targeting · Meta-compliant (question/«jusqu'à»/«si éligible»,
// mandatory filter line, no «garanti», no «votre vol A du retard»).

// Mandatory filter / pre-qualifier line (every creative carries it).
const FILTER = {
  fr: 'Vol vers l’Europe — retard ou annulation\u202f?',
  en: 'Flight to Europe — delayed or cancelled?',
};

// Shared layout atoms (uniquely named to avoid global style collisions).
const adColCenter = {
  flex: 1, display: 'flex', flexDirection: 'column',
  justifyContent: 'center', alignItems: 'center', textAlign: 'center',
  position: 'relative', zIndex: 2,
};
const adHairlineLight = { width: 120, height: 2, margin: '46px 0 40px', background: 'rgba(255,255,255,0.4)' };
const adHairlineDark  = { width: 120, height: 2, margin: '46px 0 38px', background: 'rgba(255,255,255,0.16)' };
const adEligible = { fontFamily: AD.font, fontWeight: 500, fontSize: 30, color: 'rgba(255,255,255,0.78)', marginTop: 10 };

// ─── Big money unit ────────────────────────────────────────
function Money({ amount = '600', symbol = '€', pos = 'after', size = 340,
                 color = '#fff', weight = 800 }) {
  const sym = <span style={{ fontSize: '0.5em', fontWeight: 700, verticalAlign: '0.46em' }}>{symbol}</span>;
  return (
    <span style={{
      fontFamily: AD.font, fontWeight: weight, fontSize: size,
      lineHeight: 0.82, letterSpacing: -size * 0.035, color, display: 'inline-block',
    }}>
      {pos === 'before' ? <>{sym}<span style={{ marginLeft: 2 }}>{amount}</span></>
                        : <>{amount}<span style={{ marginLeft: 6 }}>{sym}</span></>}
    </span>
  );
}

// ═══ CRÉA 1 — Le montant qui frappe (vert) ═════════════════
function Crea1({ lang = 'fr' }) {
  const c = lang === 'en' ? {
    upto: 'up to', per: 'per passenger', elig: '(if eligible)',
    law: 'It’s EU law.', notscam: 'Not a scam.',
    t1: '25% — that’s all.', t2: '€0 if we don’t win.',
    cta: 'Check on WhatsApp', sub: 'Free check · reply in under 3 min', pos: 'before',
  } : {
    upto: 'Jusqu’à', per: 'par passager', elig: '(si éligible)',
    law: 'C’est la loi européenne.', notscam: 'Pas une arnaque.',
    t1: '25\u202f% — c’est tout.', t2: '0\u202f€ si on ne gagne pas.',
    cta: 'Vérifier sur WhatsApp', sub: 'Vérification gratuite · réponse en moins de 3\u202fmin', pos: 'after',
  };
  return (
    <AdFrame
      bg={`linear-gradient(157deg, ${AD.green} 0%, ${AD.greenDeep} 62%, ${AD.greenDark} 100%)`}
      header={<FilterPill tone="light" label={lang === 'en' ? FILTER.en : undefined}/>}
      footer={<WhatsAppPill label={c.cta} variant="white" sub={c.sub}/>}
      logoUpper
    >
      <div style={adColCenter}>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
          <span style={{
            fontFamily: AD.font, fontWeight: 600, fontSize: 44, letterSpacing: 0.5,
            textTransform: 'uppercase', color: 'rgba(255,255,255,0.85)', marginBottom: -4,
          }}>{c.upto}</span>
          <Money amount="600" pos={c.pos} size={360} color="#fff"/>
          <span style={{ fontFamily: AD.font, fontWeight: 400, fontSize: 58, letterSpacing: -0.5, marginTop: 2 }}>{c.per}</span>
          <span style={adEligible}>{c.elig}</span>
        </div>
        <div style={{ marginTop: 56, fontFamily: AD.font, fontWeight: 600, fontSize: 50, letterSpacing: -0.5, lineHeight: 1.18 }}>
          <span>{c.law} </span><span style={{ opacity: 0.66 }}>{c.notscam}</span>
        </div>
        <div style={adHairlineLight}/>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12, fontFamily: AD.font, fontWeight: 500, fontSize: 38, color: 'rgba(255,255,255,0.92)', letterSpacing: -0.2 }}>
          <div>{c.t1}</div><div>{c.t2}</div>
        </div>
      </div>
    </AdFrame>
  );
}

// ═══ CRÉA 2 — Comparaison Robin vs concurrent (split) ══════
function Crea2({ lang = 'fr' }) {
  const c = lang === 'en' ? {
    on: 'On €600 of compensation:', robin: 'ROBIN', others: 'OTHERS',
    keep: 'You keep', r1: '25%', r2: 'if we win', o1: 'up to 50%', o2: 'if it goes to court',
    calc: 'Do the math.', cta: 'WhatsApp Robin',
  } : {
    on: 'Sur 600\u202f€ d’indemnité\u202f:', robin: 'ROBIN', others: 'AUTRES',

  </script>

  <script type="text/babel" data-presets="react">
    const ORDER = [
      { key: 'c1', file: 'AF-EU-1A-montant-vert.png',         name: '1A · Montant vert' },
      { key: 'c4', file: 'AF-EU-1D-attente-navy.png',         name: '1D · Attente navy' },
      { key: 'c2', file: 'AF-EU-1B-comparaison.png',          name: '1B · Comparaison' },
      { key: 'c3', file: 'AF-EU-1C-famille-nuit-etoilee.png', name: '1C · Famille nuit étoilée' },
      { key: 'c5', file: 'AF-EU-1E-route-minimal.png',        name: '1E · Route minimal' },
    ];
    const MAP = { c1: Crea1, c2: Crea2, c3: Crea3, c4: Crea4, c5: Crea5 };

    const statusEl = document.getElementById('status');
    const setStatus = (t) => { statusEl.textContent = t; };

    // Offscreen capture root (full 1080×1920, laid out off-screen).
    const slot = document.getElementById('capture-slot');
    const capRoot = ReactDOM.createRoot(slot);

    function renderInto(key) {
      return new Promise((res) => {
        capRoot.render(<MapComp keyName={key} />);
        // setTimeout (not requestAnimationFrame) so it still resolves when the
        // tab is backgrounded; gives layout + webfont a moment to settle.
        setTimeout(res, 260);
      });
    }
    function MapComp({ keyName }) {
      const C = MAP[keyName] || Crea1;
      return <C lang="fr" />;
    }

    let __fontCSS = null;
    async function ensureFontCSS() {
      if (__fontCSS !== null) return __fontCSS;
      // Build @font-face CSS with base64 woff2 ourselves. (html-to-image's own
      // getFontEmbedCSS can't read Google's cross-origin <link> stylesheet, so
      // it returns empty and text would fall back to the wrong font.)
      try {
        const cssUrl = 'https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap';
        let css = await (await fetch(cssUrl)).text();
        const urls = [...new Set([...css.matchAll(/url\((https:[^)]+\.woff2)\)/g)].map((m) => m[1]))];
        for (const u of urls) {
          const buf = await (await fetch(u)).arrayBuffer();
          const bytes = new Uint8Array(buf);
          let bin = '';
          for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
          css = css.split(u).join('data:font/woff2;base64,' + btoa(bin));
        }
        __fontCSS = css;
      } catch (e) {
        __fontCSS = '';
      }
      return __fontCSS;
    }
    async function capture(key) {
      await renderInto(key);
      const fontEmbedCSS = await ensureFontCSS();
      return await window.htmlToImage.toBlob(slot, {
        width: 1080, height: 1920, pixelRatio: 1, backgroundColor: '#000000', fontEmbedCSS,
      });
    }
    window.__capture = capture; // for self-test

    function saveBlob(blob, name) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = name;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 4000);
    }

    async function downloadOne(item) {
      setStatus('Génération de ' + item.file + '…');
      const b = await capture(item.key);
      saveBlob(b, item.file);
      setStatus(item.file + ' — ' + Math.round(b.size / 1024) + ' Ko · 1080×1920 ✓');
    }

    async function downloadAll() {
      const btn = document.getElementById('all');
      btn.disabled = true;
      try {
        await document.fonts.ready;
        const zip = new JSZip();
        for (let i = 0; i < ORDER.length; i++) {
          setStatus('Génération ' + (i + 1) + '/5 — ' + ORDER[i].file + '…');
          const b = await capture(ORDER[i].key);
          zip.file(ORDER[i].file, b);
        }
        setStatus('Compression du pack…');
        const z = await zip.generateAsync({ type: 'blob' });
        saveBlob(z, 'robin-des-airs-pubs-meta.zip');
        setStatus('✓ Pack téléchargé — 5 PNG 1080×1920 plein écran.');
      } catch (e) {
        setStatus('Erreur : ' + e.message);
      } finally {
        btn.disabled = false;
      }
    }

    // Build preview thumbnails (scaled live renders).
    function Thumb({ item }) {
      const ref = React.useRef(null);
      React.useEffect(() => {
        const el = ref.current;
        const fit = () => {
          const w = el.parentElement.clientWidth;
          el.style.transform = 'scale(' + (w / 1080) + ')';
          el.parentElement.style.height = (w * 1920 / 1080) + 'px';
        };
        fit();
        const ro = new ResizeObserver(fit); ro.observe(el.parentElement);
        return () => ro.disconnect();
      }, []);
      const C = MAP[item.key];
      return (
        <div className="card">
          <div className="thumb">
            <div className="scaler" ref={ref}><C lang="fr" /></div>
          </div>
          <div className="meta">
            <span className="fname" title={item.file}>{item.file}</span>
            <button className="dl" title="Télécharger ce PNG" onClick={() => downloadOne(item)}>↓</button>
          </div>
        </div>
      );
    }

    function Grid() {
      return <>{ORDER.map((item) => <Thumb key={item.key} item={item} />)}</>;
    }

    function start() {
      if (!window.Crea1 || !window.AD || !window.htmlToImage || !window.JSZip) return setTimeout(start, 50);
      ReactDOM.createRoot(document.getElementById('grid')).render(<Grid />);
      document.getElementById('all').addEventListener('click', downloadAll);
    }
    start();
  </script>
</body>
