<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">

  <style>
    :root { --navy:#061326; --teal:#00c87a; --bg:#faf8f3; --earth:#6b4c3b; }

    body { margin:0; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; background: var(--bg); color: var(--navy); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; line-height: 1.55; }
    .box { max-width: 520px; text-align: center; background: #fff; border-radius: 16px; padding: 40px 28px; box-shadow: 0 8px 32px rgba(6,19,38,.08); border: 1px solid rgba(184,149,108,.15); }
    h1 { margin: 0 0 14px; font-size: 1.5rem; }
    p { margin: 0 0 22px; color: var(--earth); font-size: 15px; }
    a.btn { display: inline-block; background: var(--teal); color: #fff; font-weight: 700; padding: 14px 24px; border-radius: 10px; text-decoration: none; }
    a.btn:hover { filter: brightness(0.95); }
    .foot { margin-top: 28px; font-size: 13px; color: var(--earth); }
    .foot a { color: #009960; }
  </style>
</head>
<body>
  <main class="box">
