<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBIN DES AIRS — V8 BULLETPROOF</title>
    <style>
        :root { --red: #ff4d4d; --green: #2ecc71; --blue: #3498db; --orange: #f39c12; --bg: #050505; --card: #111; --border: #222; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        .top-container { position: sticky; top: 0; z-index: 1000; background: var(--bg); padding: 15px 20px; border-bottom: 2px solid var(--border); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo-main { font-size: 22px; font-weight: 900; color: var(--red); letter-spacing: 1px; }
        
        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .stat-card { background: var(--card); padding: 12px; border-radius: 8px; border: 1px solid var(--border); text-align: center; }
        .stat-value { font-size: 22px; font-weight: 900; display: block; }

        .btn-refresh { background: var(--red); color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .table-container { padding: 20px; }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; }
        thead th { position: sticky; top: 145px; z-index: 900; background: #1a1a1a; color: #888; padding: 12px; font-size: 10px; text-transform: uppercase; text-align: left; border-bottom: 2px solid var(--border); }
        tbody td { padding: 12px; border-bottom: 1px solid #1a1a1a; }

        .btn-action { cursor: pointer; border: none; border-radius: 4px; padding: 6px 10px; font-size: 14px; margin-right: 5px; color: white; }
        .badge-600 { background: var(--green); color: black; padding: 5px 10px; border-radius: 4px; font-weight: 900; font-size: 11px; }
        .airline-logo { width: 25px; height: 25px; vertical-align: middle; margin-right: 8px; background: white; padding: 2px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="top-container">
    <div class="header">
        <div class="logo-main">🏹 ROBIN DES AIRS <span style="font-size: 11px; font-weight: 400; color: #666;">| V8 BULLETPROOF</span></div>
        <button class="btn-refresh" onclick="lancerScan()">🔄 SCAN LIVE</button>
    </div>
    <div class="dashboard">
        <div class="stat-card"><span id="count-critical" class="stat-value">0</span><span style="font-size:10px;color:#666">CRITIQUES</span></div>
        <div class="stat-card"><span id="total-cash" class="stat-value" style="color:var(--green)">0 €</span><span style="font-size:10px;color:#666">CASH POTENTIEL</span></div>
        <div class="stat-card"><span id="total-vols" class="stat-value">0</span><span style="font-size:10px;color:#666">VOLS</span></div>
        <div class="stat-card"><span id="live-time" class="stat-value">--:--</span><span style="font-size:10px;color:#666">DERNIER SCAN</span></div>
    </div>
</div>

<div class="table-container">
    <table id="main-table">
        <thead>
            <tr>
                <th>Date</th>
                <th>Vol</th>
                <th>Immat</th>
                <th>Trajet</th>
                <th>Décollage</th>
                <th>Arrivée</th>
                <th>Statut</th>
                <th>Retard</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="flight-list">
            <tr><td colspan="9" style="text-align:center; padding:100px;">Cliquez sur SCAN LIVE pour démarrer.</td></tr>
        </tbody>
    </table>
</div>

<script>
    const accessCode = "robin-dakar";
    const API_KEY = "ea71e3-c99347";
    
    if (sessionStorage.getItem('auth') !== 'ok') {
        if (prompt("Code :") === accessCode) sessionStorage.setItem('auth', 'ok');
        else window.location.href = "https://google.com";
    }

    const HUBS = ['CDG','ORY','BRU','AMS','LIS','DSS','ABJ','BKO','CKY','OUA','LFW','ACC','ABV','LOS','COO','NKC','NIM','FNA','ROB','DLA','NSI','LBV','FIH','BZV','PNR','BGF','LAD','SSG','NDJ','NBO','DAR','ADD','JNB','CPT','KGL','JIB','ZNZ','TNR','MRU','RUN','DZA'];
    const AIRLINES = ['AF','SN','KL','LH','TP','IB','BA','VY','TO'];

    function copier(txt) {
        navigator.clipboard.writeText(txt);
        alert("Copié !");
    }

    function timeStr(iso) {
        if (!iso) return '--';
        var part = (iso + '').split('T')[1];
        return part ? part.substring(0, 5) : '--';
    }

    async function lancerScan() {
        const list = document.getElementById('flight-list');
        list.innerHTML = "<tr><td colspan='9' style='text-align:center; padding:100px;'>Scan en cours...</td></tr>";
        
        try {
            const calls = HUBS.map(function(h) {
                return fetch("https://aviation-edge.com/v2/public/timetable?key=" + API_KEY + "&iataCode=" + h + "&type=arrival&_=" + Date.now()).then(function(r) { return r.json(); }).catch(function() { return []; });
            });
            const results = await Promise.all(calls);
            const raw = results.flat().filter(function(f) {
                return f && f.arrival && f.departure && f.airline && f.flight && AIRLINES.indexOf(f.airline.iataCode) >= 0;
            });
            
            const unique = new Map();
            raw.forEach(function(f) {
                var key = (f.arrival.scheduledTime || '') + "_" + (f.departure.iataCode || '') + "_" + (f.arrival.iataCode || '');
                if (!unique.has(key)) unique.set(key, f);
            });

            const flights = Array.from(unique.values()).sort(function(a, b) { return (b.arrival.delay || 0) - (a.arrival.delay || 0); });
            list.innerHTML = "";
            var crits = 0;

            flights.forEach(function(f) {
                var delay = f.arrival.delay || 0;
                var isCrit = delay >= 180;
                if (isCrit) crits++;

                var row = document.createElement('tr');
                if (isCrit) row.style.background = "rgba(255,77,77,0.1)";
                
                var flightNum = (f.flight && f.flight.iataNumber) || '--';
                var depTime = timeStr(f.departure.scheduledTime);
                var arrTime = timeStr(f.arrival.scheduledTime);
                row.innerHTML =
                    "<td>" + new Date(f.arrival.scheduledTime).toLocaleDateString('fr-FR') + "</td>" +
                    "<td><img src=\"https://www.gstatic.com/flights/airline_logos/70px/" + (f.airline.iataCode || '') + ".png\" class=\"airline-logo\" onerror=\"this.style.display='none'\">" + flightNum + "</td>" +
                    "<td>" + (f.aircraft && f.aircraft.regNumber ? f.aircraft.regNumber : '--') + "</td>" +
                    "<td>" + (f.departure.iataCode || '') + " ➔ " + (f.arrival.iataCode || '') + "</td>" +
                    "<td>" + depTime + "</td>" +
                    "<td>" + arrTime + "</td>" +
                    "<td>" + (f.status || '--') + "</td>" +
                    "<td style=\"color:" + (isCrit ? 'red' : 'inherit') + "\"><b>" + delay + " min</b></td>" +
                    "<td>" +
                    (isCrit ? "<span class=\"badge-600\">9 600 €</span> " : "") +
                    "<button class=\"btn-action\" style=\"background:#333\" onclick=\"copier('Vol " + flightNum.replace(/'/g, "\\'") + " retardé de " + delay + " min. Contactez-nous !')\">🎯</button>" +
                    "</td>";
                list.appendChild(row);
            });

            document.getElementById('count-critical').innerText = crits;
            document.getElementById('total-cash').innerText = (crits * 9600).toLocaleString('fr-FR') + " €";
            document.getElementById('total-vols').innerText = flights.length;
            document.getElementById('live-time').innerText = new Date().toLocaleTimeString('fr-FR');

        } catch (e) {
            list.innerHTML = "<tr><td colspan='9' style='text-align:center; color:red;'>Erreur de chargement. Vérifiez la console.</td></tr>";
        }
    }
</script>
</body>
</html>
