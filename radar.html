<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radar Robin des Airs — Elite Africa (AF-KL-LH-SN)</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <style>
    :root { --red: #ff4d4d; --yellow: #ffcc00; --green: #2ecc71; --orange: #ea580c; --bg: #121212; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; min-height: 100vh; padding: 20px; }
    .dashboard { max-width: 1300px; margin: auto; }
    header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 16px; border-bottom: 2px solid #333; padding-bottom: 20px; margin-bottom: 20px; }
    .logo { font-size: 22px; font-weight: bold; color: var(--red); }
    .stat-card { background: #1e1e1e; padding: 12px 20px; border-radius: 8px; border: 1px solid #333; text-align: center; display: inline-block; }
    .stat-card span { display: block; font-size: 22px; font-weight: bold; }
    .toolbar { margin-bottom: 16px; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
    select { padding: 8px 12px; border-radius: 6px; border: 1px solid #444; background: #1e1e1e; color: #fff; font-size: 14px; }
    .btn { padding: 8px 16px; border-radius: 6px; border: none; background: #25D366; color: #fff; font-weight: 600; cursor: pointer; font-size: 13px; }
    .btn:hover { opacity: 0.9; }
    table { width: 100%; border-collapse: collapse; background: #1e1e1e; border-radius: 10px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-size: 14px; }
    th { background: #252525; padding: 14px 12px; text-align: left; color: #888; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
    td { padding: 14px 12px; border-bottom: 1px solid #252525; }
    tr:hover { background: rgba(255,255,255,0.03); }
    .row-red { background: rgba(255, 77, 77, 0.15); border-left: 5px solid var(--red); }
    .row-orange { background: rgba(234, 88, 12, 0.12); border-left: 5px solid var(--orange); }
    .row-yellow { background: rgba(255, 204, 0, 0.08); border-left: 5px solid var(--yellow); }
    .row-cancelled { background: rgba(153, 27, 27, 0.2); border-left: 5px solid #991b1b; }
    .badge { padding: 4px 10px; border-radius: 4px; font-weight: bold; font-size: 11px; }
    .badge-red { background: var(--red); color: white; }
    .badge-orange { background: var(--orange); color: white; }
    .badge-yellow { background: var(--yellow); color: black; }
    .badge-green { background: var(--green); color: white; }
    .badge-grey { background: #64748b; color: white; }
    .badge-cancelled { background: #991b1b; color: white; }
    .btn-whatsapp { background: #25D366; color: white; border: none; padding: 8px 14px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; text-decoration: none; display: inline-block; }
    .btn-whatsapp:hover { opacity: 0.9; }
    .airline-tag { font-weight: bold; background: #444; padding: 3px 8px; border-radius: 3px; font-size: 12px; }
    .delay-big { font-size: 16px; font-weight: bold; color: var(--yellow); }
    .row-red .delay-big { color: var(--red); }
    .row-cancelled .delay-big { color: #ccc; }
    #loader { text-align: center; padding: 40px; color: #888; }
    .meta { font-size: 12px; color: #666; margin-top: 8px; }
    #gate { max-width: 320px; margin: 40px auto; text-align: center; }
    #gate input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #444; background: #1e1e1e; color: #fff; font-size: 14px; margin-bottom: 10px; }
    #gate .btn { width: 100%; }
    .gate-err { font-size: 12px; color: var(--red); margin-top: 8px; display: none; }
  </style>
</head>
<body>

  <div id="gate" style="display:none;">
    <p style="margin-bottom:16px; color:#ccc;">Accès privé — Radar Elite</p>
    <input type="password" id="pwd" placeholder="Mot de passe">
    <button type="button" class="btn" id="btn-unlock">Accéder</button>
    <p class="gate-err" id="gate-err">Mot de passe incorrect.</p>
  </div>

  <div id="radar-content" class="dashboard" style="display:none;">
    <header>
      <div class="logo">🏹 ROBIN DES AIRS : RADAR ELITE</div>
      <div style="display:flex; flex-wrap:wrap; gap:10px;">
        <div class="stat-card">Vols critiques (≥2h30) <span id="count-red" style="color:var(--red)">0</span></div>
        <div class="stat-card">Potentiel Cash <span id="total-cash" style="color:var(--green)">0 €</span></div>
      </div>
    </header>

    <div class="toolbar">
      <label>Aéroport
        <select id="airport">
          <option value="DSS" selected>DSS — Dakar</option>
          <option value="CDG">CDG — Paris</option>
          <option value="ORY">ORY — Orly</option>
          <option value="BRU">BRU — Bruxelles</option>
          <option value="MRS">MRS — Marseille</option>
          <option value="LYS">LYS — Lyon</option>
          <option value="CMN">CMN — Casablanca</option>
        </select>
      </label>
      <label>Type
        <select id="type">
          <option value="departure">Départs</option>
          <option value="arrival">Arrivées</option>
        </select>
      </label>
      <button class="btn" id="btn-refresh">Rafraîchir</button>
      <span class="meta" id="updated"></span>
    </div>

    <div id="loader">Scan en cours : AF, KL, LH, SN…</div>

    <table id="flight-table" style="display:none;">
      <thead>
        <tr>
          <th>Vol</th>
          <th>Compagnie</th>
          <th>Itinéraire</th>
          <th>Retard</th>
          <th>Statut</th>
          <th>Indemnité</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="flight-body"></tbody>
    </table>
  </div>

  <script>
    var RADAR_PWD = 'robin-dakar';
    var WHATSAPP_NUMBER = '33756863630';
    var refreshTimer;

    function checkAccess() {
      try { return sessionStorage.getItem('radar_ok') === '1'; } catch (e) { return false; }
    }
    function setAccess(ok) {
      try { sessionStorage.setItem('radar_ok', ok ? '1' : '0'); } catch (e) {}
    }
    function showGate() {
      document.getElementById('gate').style.display = 'block';
      document.getElementById('radar-content').style.display = 'none';
    }
    function showRadar() {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('radar-content').style.display = 'block';
    }

    function api(airport, type) {
      return fetch('/.netlify/functions/radar?airport=' + encodeURIComponent(airport) + '&type=' + encodeURIComponent(type))
        .then(function(r) { return r.json(); });
    }

    function render(data) {
      var loader = document.getElementById('loader');
      var table = document.getElementById('flight-table');
      var body = document.getElementById('flight-body');
      loader.style.display = 'none';
      table.style.display = 'table';
      body.innerHTML = '';

      var flights = (data && data.flights) ? data.flights : [];
      var redCount = 0;
      var totalCash = 0;

      flights.forEach(function(f) {
        var color = f.cancelled ? 'CANCELLED' : (f.color || 'GREY');
        var rowClass = 'row-' + (color === 'RED' ? 'red' : color === 'ORANGE' ? 'orange' : color === 'YELLOW' ? 'yellow' : color === 'CANCELLED' ? 'cancelled' : '');
        var badgeClass = 'badge-' + (color === 'CANCELLED' ? 'cancelled' : color.toLowerCase());
        var statusLabel = f.cancelled ? 'ANNULÉ' : (color === 'RED' ? '≥2h30' : color === 'ORANGE' ? '1h–2h30' : color === 'YELLOW' ? '~1h' : color === 'GREEN' ? 'OK' : '—');
        var retard = f.cancelled ? '—' : (f.delayMinutes != null ? f.delayMinutes + ' min' : '—');
        var indemnite = (f.eligible && (color === 'RED' || color === 'ORANGE' || color === 'YELLOW')) ? '450 €' : (f.eligible ? '—' : '—');
        if (f.eligible && (color === 'RED' || color === 'ORANGE')) totalCash += 450;
        if (color === 'RED') redCount++;

        var waMsg = 'Bonjour Robin ! Mon vol ' + (f.flight || '') + ' (' + (f.dep || '') + ' → ' + (f.arr || '') + ') a ' + (f.cancelled ? 'été annulé' : retard + ' de retard') + '. Je souhaite lancer mon dossier.';
        var waUrl = 'https://wa.me/' + WHATSAPP_NUMBER + '?text=' + encodeURIComponent(waMsg);

        var tr = document.createElement('tr');
        if (rowClass) tr.className = rowClass;
        tr.innerHTML =
          '<td><strong>' + (f.flight || '—') + '</strong></td>' +
          '<td><span class="airline-tag">' + (f.airline || '—') + '</span></td>' +
          '<td>' + (f.dep || '—') + ' → ' + (f.arr || '—') + '</td>' +
          '<td><span class="delay-big">' + retard + '</span></td>' +
          '<td><span class="badge ' + badgeClass + '">' + statusLabel + '</span></td>' +
          '<td>' + indemnite + '</td>' +
          '<td><a href="' + waUrl + '" target="_blank" class="btn-whatsapp">WhatsApp</a></td>';
        body.appendChild(tr);
      });

      document.getElementById('count-red').textContent = redCount;
      document.getElementById('total-cash').textContent = totalCash + ' €';
      document.getElementById('updated').textContent = 'MAJ : ' + (data && data.updatedAt ? new Date(data.updatedAt).toLocaleTimeString('fr-FR') : '—');
    }

    function load() {
      var airport = document.getElementById('airport').value;
      var type = document.getElementById('type').value;
      document.getElementById('loader').style.display = 'block';
      document.getElementById('flight-table').style.display = 'none';
      api(airport, type).then(function(data) {
        render(data);
      }).catch(function(e) {
        document.getElementById('loader').innerHTML = 'Erreur : ' + (e.message || 'réseau');
        document.getElementById('loader').style.display = 'block';
      });
    }

    document.getElementById('btn-refresh').addEventListener('click', load);
    document.getElementById('airport').addEventListener('change', load);
    document.getElementById('type').addEventListener('change', load);

    if (checkAccess()) {
      showRadar();
      load();
      refreshTimer = setInterval(load, 5 * 60 * 1000);
    } else {
      showGate();
      document.getElementById('btn-unlock').onclick = function() {
        var pwd = document.getElementById('pwd').value;
        var err = document.getElementById('gate-err');
        if (pwd === RADAR_PWD) {
          setAccess(true);
          err.style.display = 'none';
          showRadar();
          load();
          refreshTimer = setInterval(load, 5 * 60 * 1000);
        } else {
          err.style.display = 'block';
        }
      };
      document.getElementById('pwd').onkeydown = function(e) {
        if (e.key === 'Enter') document.getElementById('btn-unlock').click();
      };
    }
  </script>
</body>
</html>
