<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>ROBIN DES AIRS — Radar Spécial Afrique</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #161616;
      --border: #333;
      --red: #ff4d4d;
      --green: #2ecc71;
      --gray: #888;
      --text: #e0e0e0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; padding: 20px; }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      border-bottom: 2px solid var(--red);
      padding-bottom: 16px;
      margin-bottom: 24px;
    }
    .logo { font-size: 22px; font-weight: 900; color: var(--red); letter-spacing: 1px; }

    .dashboard {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: var(--card);
      flex: 1;
      min-width: 140px;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      text-align: center;
    }
    .stat-card.critical { border-bottom: 4px solid var(--red); }
    .stat-card.cash { border-bottom: 4px solid var(--green); }
    .stat-label { font-size: 11px; color: var(--gray); text-transform: uppercase; font-weight: bold; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 900; }
    .stat-value.red { color: var(--red); }
    .stat-value.green { color: var(--green); }

    .toolbar {
      background: #111;
      padding: 16px 20px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      border: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .search-wrap {
      flex: 1;
      min-width: 200px;
    }
    .search-wrap input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 14px;
    }
    .search-wrap input::placeholder { color: var(--gray); }
    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      font-size: 13px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn-scan { background: var(--red); color: white; }
    .btn-auto { background: var(--border); color: var(--text); }
    .btn-auto.active { background: var(--green); color: #0a0a0a; box-shadow: 0 0 16px rgba(46, 204, 113, 0.4); }

    .table-wrap {
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      background: #1a1a1a;
      color: var(--gray);
      padding: 14px 16px;
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    tbody td { padding: 14px 16px; border-bottom: 1px solid #222; }
    tbody tr:hover { background: rgba(255,255,255,0.03); }
    .row-critical { background: rgba(255, 77, 77, 0.08); border-left: 4px solid var(--red); }
    .badge-cash { background: var(--green); color: #0a0a0a; padding: 6px 12px; border-radius: 6px; font-weight: 900; font-size: 12px; }
    .delay-val { font-weight: bold; }
    .delay-val.critical { color: var(--red); }
    #loader { text-align: center; padding: 60px 20px; color: var(--gray); font-size: 16px; }
    .status-msg { font-size: 12px; color: var(--gray); font-style: italic; }
  </style>
</head>
<body>

  <header class="header">
    <div class="logo">🏹 ROBIN DES AIRS — Radar Spécial Afrique</div>
  </header>

  <div class="dashboard">
    <div class="stat-card critical">
      <div class="stat-label">Vols critiques</div>
      <div id="count-critical" class="stat-value red">0</div>
    </div>
    <div class="stat-card cash">
      <div class="stat-label">Cash potentiel</div>
      <div id="total-cash" class="stat-value green">0 €</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total vols</div>
      <div id="total-flights" class="stat-value">0</div>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <input type="text" id="search-airline" placeholder="Filtrer par compagnie (ex: AF, Air France)..." autocomplete="off">
    </div>
    <button type="button" class="btn btn-scan" id="btn-scan">Scan rapide</button>
    <button type="button" class="btn btn-auto" id="btn-auto">Auto-Scan (2 min)</button>
    <span id="status-msg" class="status-msg">Prêt.</span>
  </div>

  <div id="loader" style="display: none;">Scan des 45 hubs en cours...</div>
  <div class="table-wrap" id="table-wrap">
    <table>
      <thead>
        <tr>
          <th>N° Vol</th>
          <th>Compagnie</th>
          <th>Trajet</th>
          <th>Heure arrivée est.</th>
          <th>Retard</th>
          <th>Cash</th>
        </tr>
      </thead>
      <tbody id="flight-body"></tbody>
    </table>
  </div>

<script>
(function() {
  var API_KEY = 'ea71e3-c99347';
  var HUBS = [
    'DSS','ABJ','BKO','CKY','OUA','LFW','ACC','ABV','LOS','COO','NKC','NIM','FNA','ROB',
    'DLA','NSI','LBV','FIH','BZV','PNR','BGF','LAD','SSG','NDJ',
    'NBO','DAR','ADD','JNB','CPT','KGL','JIB','ZNZ','TNR','MRU','RUN','DZA',
    'CDG','ORY','BRU','AMS','LIS','MAD','FRA','LHR','BCN'
  ];
  var EU_AIRLINES = ['AF','SN','KL','LH','TP','IB','BA','VY','TO'];
  var EUROPE_HUBS = ['CDG','ORY','BRU','AMS','LIS','MAD','FRA','LHR','BCN'];
  var CRITICAL_DELAY_MIN = 180;
  var AUTO_INTERVAL_MS = 2 * 60 * 1000;

  var allFlights = [];
  var autoTimer = null;

  function isEuropeOrigin(depIata) {
    return EUROPE_HUBS.indexOf((depIata || '').toUpperCase()) !== -1;
  }
  function isEuAirline(airlineIata) {
    return EU_AIRLINES.indexOf((airlineIata || '').toUpperCase()) !== -1;
  }
  function keepFlight(f) {
    var dep = (f.departure && f.departure.iataCode) ? f.departure.iataCode.toUpperCase() : '';
    var air = (f.airline && f.airline.iataCode) ? f.airline.iataCode.toUpperCase() : '';
    return isEuAirline(air) || isEuropeOrigin(dep);
  }

  function delayMinutes(f) {
    var dep = f.departure || {};
    var arr = f.arrival || {};
    var scheduled = arr.scheduledTime || dep.scheduledTime;
    var actual = arr.actualTime || arr.estimatedTime || dep.actualTime || dep.estimatedTime;
    if (typeof arr.delay === 'number' && arr.delay >= 0) return arr.delay;
    if (typeof dep.delay === 'number' && dep.delay >= 0) return dep.delay;
    if (scheduled && actual) {
      var d = (new Date(actual).getTime() - new Date(scheduled).getTime()) / 60000;
      return Math.round(d) > 0 ? Math.round(d) : 0;
    }
    return 0;
  }

  function arrivalTimeStr(f) {
    var arr = f.arrival || {};
    var t = arr.actualTime || arr.estimatedTime || arr.scheduledTime;
    if (!t) return '—';
    var d = new Date(t);
    if (isNaN(d.getTime())) return '—';
    return ('0' + d.getUTCHours()).slice(-2) + ':' + ('0' + d.getUTCMinutes()).slice(-2) + 'Z';
  }

  function routeKey(f) {
    var dep = (f.departure && f.departure.iataCode) || '';
    var arr = (f.arrival && f.arrival.iataCode) || '';
    var time = (f.departure && f.departure.scheduledTime) || '';
    var fl = (f.flight && (f.flight.iata || f.flight.iataNumber || f.flight.number)) || '';
    return fl + '|' + dep + '|' + arr + '|' + time;
  }

  function runScan() {
    var loader = document.getElementById('loader');
    var body = document.getElementById('flight-body');
    var status = document.getElementById('status-msg');
    if (loader) loader.style.display = 'block';
    if (body) body.innerHTML = '';
    if (status) status.textContent = 'Scan des 45 hubs (départs + arrivées)...';

    var seen = {};
    var collected = [];
    var base = 'https://aviation-edge.com/v2/public/timetable';
    var cache = Date.now();

    function fetchHub(hub, type) {
      var url = base + '?key=' + API_KEY + '&iataCode=' + hub + '&type=' + type + '&_=' + cache;
      return fetch(url, { cache: 'no-store' }).then(function(r) { return r.json(); }).catch(function() { return []; });
    }

    var promises = [];
    HUBS.forEach(function(hub) {
      promises.push(fetchHub(hub, 'departure'));
      promises.push(fetchHub(hub, 'arrival'));
    });

    Promise.all(promises).then(function(results) {
      results.forEach(function(arr) {
        if (!Array.isArray(arr)) return;
        arr.forEach(function(f) {
          if (!keepFlight(f)) return;
          var key = routeKey(f);
          if (seen[key]) return;
          seen[key] = true;
          var delay = delayMinutes(f);
          var cancelled = (f.status || '').toLowerCase() === 'cancelled' || (f.status || '').toLowerCase() === 'canceled';
          collected.push({
            flight: (f.flight && (f.flight.iata || f.flight.iataNumber || f.flight.number)) || '—',
            airline: (f.airline && f.airline.iataCode) ? f.airline.iataCode.toUpperCase() : '—',
            airlineName: (f.airline && f.airline.name) ? f.airline.name : '',
            dep: (f.departure && f.departure.iataCode) ? f.departure.iataCode.toUpperCase() : '—',
            arr: (f.arrival && f.arrival.iataCode) ? f.arrival.iataCode.toUpperCase() : '—',
            arrivalEst: arrivalTimeStr(f),
            delayMinutes: cancelled ? null : delay,
            cancelled: cancelled,
            critical: cancelled || delay >= CRITICAL_DELAY_MIN
          });
        });
      });

      collected.sort(function(a, b) {
        var ac = a.critical ? 0 : 1, bc = b.critical ? 0 : 1;
        if (ac !== bc) return ac - bc;
        return (b.delayMinutes || 0) - (a.delayMinutes || 0);
      });

      allFlights = collected;
      if (loader) loader.style.display = 'none';
      if (status) status.textContent = 'Dernier scan : ' + collected.length + ' vol(s).';
      renderTable(allFlights);
      updateCounters(allFlights);
    }).catch(function(err) {
      if (loader) loader.style.display = 'none';
      if (status) status.textContent = 'Erreur : ' + (err.message || 'réseau');
      if (body) body.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--gray);">Échec du scan. Vérifiez la clé API et les requêtes HTTPS.</td></tr>';
    });
  }

  function updateCounters(flights) {
    var crit = flights.filter(function(f) { return f.critical; }).length;
    document.getElementById('count-critical').textContent = crit;
    document.getElementById('total-cash').textContent = (crit * 600) + ' €';
    document.getElementById('total-flights').textContent = flights.length;
  }

  function renderTable(flights) {
    var body = document.getElementById('flight-body');
    var q = (document.getElementById('search-airline').value || '').trim().toLowerCase();
    var list = flights;
    if (q) {
      list = flights.filter(function(f) {
        return (f.airline || '').toLowerCase().indexOf(q) !== -1 ||
               (f.airlineName || '').toLowerCase().indexOf(q) !== -1;
      });
    }
    body.innerHTML = '';
    list.forEach(function(f) {
      var tr = document.createElement('tr');
      if (f.critical) tr.className = 'row-critical';
      var delayStr = f.cancelled ? 'Annulé' : (f.delayMinutes != null ? f.delayMinutes + ' min' : '0 min');
      var cashCell = f.critical ? '<span class="badge-cash">600 €</span>' : '—';
      var delayClass = f.critical && !f.cancelled ? ' class="delay-val critical"' : ' class="delay-val"';
      tr.innerHTML =
        '<td><strong>' + (f.flight || '—') + '</strong></td>' +
        '<td>' + (f.airline || '—') + (f.airlineName ? ' <span style="color:var(--gray);font-size:11px;">' + f.airlineName + '</span>' : '') + '</td>' +
        '<td>' + (f.dep || '—') + ' → ' + (f.arr || '—') + '</td>' +
        '<td>' + (f.arrivalEst || '—') + '</td>' +
        '<td' + delayClass + '>' + delayStr + '</td>' +
        '<td>' + cashCell + '</td>';
      body.appendChild(tr);
    });
  }

  document.getElementById('search-airline').addEventListener('input', function() {
    renderTable(allFlights);
  });

  document.getElementById('btn-scan').addEventListener('click', function() {
    runScan();
  });

  document.getElementById('btn-auto').addEventListener('click', function() {
    var btn = document.getElementById('btn-auto');
    if (autoTimer) {
      clearInterval(autoTimer);
      autoTimer = null;
      btn.classList.remove('active');
      btn.textContent = 'Auto-Scan (2 min)';
    } else {
      runScan();
      autoTimer = setInterval(runScan, AUTO_INTERVAL_MS);
      btn.classList.add('active');
      btn.textContent = 'Auto-Scan ON';
    }
  });

  runScan();
})();
</script>
</body>
</html>
