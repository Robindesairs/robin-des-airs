<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBIN DES AIRS — COMMANDER V5</title>
    <style>
        :root { --red: #ff4d4d; --green: #2ecc71; --blue: #3498db; --orange: #f39c12; --bg: #0a0a0a; --card: #161616; --border: #333; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 20px; line-height: 1.5; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--red); padding-bottom: 15px; margin-bottom: 25px; }
        .logo { font-size: 26px; font-weight: 900; color: var(--red); text-transform: uppercase; letter-spacing: 2px; }
        .dashboard { display: flex; gap: 20px; margin-bottom: 25px; }
        .stat-card { background: var(--card); flex: 1; padding: 20px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-label { font-size: 11px; color: #888; text-transform: uppercase; font-weight: bold; }
        .stat-value { font-size: 32px; font-weight: 900; margin-top: 5px; }
        .toolbar { background: #111; padding: 20px; border-radius: 12px; display: flex; flex-wrap: wrap; align-items: center; gap: 15px; margin-bottom: 25px; border: 1px solid #222; }
        .btn { border: none; padding: 12px 24px; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        .btn-manual { background: var(--red); color: white; }
        .table-container { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
        thead th { background: #1f1f1f; color: #888; padding: 15px; font-size: 10px; text-transform: uppercase; }
        tbody td { padding: 15px; border-bottom: 1px solid #222; }
        .badge-600 { background: var(--green); color: black; padding: 5px 10px; border-radius: 5px; font-weight: 900; }
        .airline-tag { font-size: 10px; font-weight: bold; color: var(--blue); border: 1px solid var(--blue); padding: 2px 5px; border-radius: 4px; display: inline-block; }
    </style>
</head>
<body>
<div class="header"><div class="logo">🏹 ROBIN DES AIRS <span style="font-weight: 300; font-size: 14px;">— COMMANDER V5</span></div><div id="clock" style="color:var(--orange); font-weight:bold;">00:00:00</div></div>
<div class="dashboard">
    <div class="stat-card" style="border-top: 4px solid var(--red);"><div class="stat-label">CRITIQUES (+3H)</div><div id="count-critical" class="stat-value" style="color: var(--red);">0</div></div>
    <div class="stat-card" style="border-top: 4px solid var(--green);"><div class="stat-label">CASH POTENTIEL</div><div id="total-cash" class="stat-value" style="color: var(--green);">0 €</div></div>
    <div class="stat-card" style="border-top: 4px solid var(--blue);"><div class="stat-label">VOLS FILTRÉS</div><div id="total-vols" class="stat-value" style="color: var(--blue);">0</div></div>
</div>
<div class="toolbar">
    <button class="btn btn-manual" onclick="lancerScan()">🚀 Scan Rapide Afrique/Europe</button>
    <div id="status-text" style="font-size: 11px; color: #555;">HTTPS OK | Clé Active | 45 Hubs</div>
</div>
<div class="table-container">
    <table id="radar-table">
        <thead><tr><th>Vol</th><th>Cie</th><th>Itinéraire</th><th>Arrivée Est.</th><th>Retard</th><th>Cash</th></tr></thead>
        <tbody id="flight-list"><tr><td colspan="6" style="text-align:center;padding:50px;color:#555;">Initialisation du radar...</td></tr></tbody>
    </table>
</div>
<script>
    const p1 = 'ea71e3'; const p2 = 'c99347'; const API_KEY = p1 + '-' + p2;
    
    const EU_HUBS = ['CDG','ORY','BRU','AMS','LIS','MAD','FRA','LHR','BCN'];
    const AF_HUBS = ['DSS','ABJ','BKO','CKY','OUA','LFW','ACC','ABV','LOS','COO','NKC','NIM','FNA','ROB','DLA','NSI','LBV','FIH','BZV','PNR','BGF','LAD','SSG','NDJ','NBO','DAR','ADD','JNB','CPT','KGL','JIB','ZNZ','TNR','MRU','RUN','DZA'];
    const ALL_HUBS = [...EU_HUBS, ...AF_HUBS];
    const EU_AIRLINES = ['AF','SN','KL','LH','TP','IB','BA','VY','TO'];

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);

    async function lancerScan() {
        const list = document.getElementById('flight-list');
        list.innerHTML = "<tr><td colspan='6' style='text-align:center;'>Filtrage spécial Europe-Afrique en cours...</td></tr>";
        try {
            const calls = ALL_HUBS.map(h => fetch(`https://aviation-edge.com/v2/public/timetable?key=${API_KEY}&iataCode=${h}&type=arrival`).then(r => r.json()).catch(() => []));
            const results = await Promise.all(calls);
            
            let flights = results.flat().filter(f => {
                if (!f.arrival || !f.departure || !f.airline) return false;
                
                const dep = f.departure.iataCode;
                const arr = f.arrival.iataCode;
                const isEuAirline = EU_AIRLINES.includes(f.airline.iataCode);
                
                // LOGIQUE EUROPE <-> AFRIQUE
                const isEuToAf = EU_HUBS.includes(dep) && AF_HUBS.includes(arr);
                const isAfToEu = AF_HUBS.includes(dep) && EU_HUBS.includes(arr);
                
                return isEuAirline && (isEuToAf || isAfToEu);
            });
            
            // Tri par retard décroissant
            flights.sort((a,b) => (b.arrival.delay || 0) - (a.arrival.delay || 0));
            
            list.innerHTML = "";
            let crits = 0;
            flights.forEach(f => {
                const delay = f.arrival.delay || 0;
                const isCrit = (delay >= 180 || f.status === 'cancelled');
                if (isCrit) crits++;
                const arrTime = f.arrival.estimatedTime || f.arrival.scheduledTime;
                
                list.innerHTML += `<tr style="${isCrit ? 'background:rgba(255,77,77,0.1); border-left:4px solid var(--red);' : ''}">
                    <td><b>${f.flight.iataNumber}</b></td>
                    <td><span class="airline-tag">${f.airline.iataCode}</span></td>
                    <td>${f.departure.iataCode} ✈️ ${f.arrival.iataCode}</td>
                    <td style="color:var(--orange)"><b>${new Date(arrTime).toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'})}</b></td>
                    <td><b>${delay} min</b></td>
                    <td>${isCrit ? '<span class="badge-600">600 €</span>' : '--'}</td>
                </tr>`;
            });
            
            document.getElementById('count-critical').innerText = crits;
            document.getElementById('total-cash').innerText = (crits * 600) + " €";
            document.getElementById('total-vols').innerText = flights.length;
            
        } catch (e) { list.innerHTML = "Erreur technique."; }
    }
    lancerScan();
</script>
</body>
</html>
