<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBIN DES AIRS — V6.3 STICKY & CASH PRO</title>
    <style>
        :root { --red: #ff4d4d; --green: #2ecc71; --blue: #3498db; --orange: #f39c12; --bg: #050505; --card: #111; --border: #222; }
        
        body { background: var(--bg); color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        .top-container { 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            background: var(--bg); 
            padding: 15px 20px 5px 20px;
            border-bottom: 1px solid var(--border);
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo-main { font-size: 22px; font-weight: 900; color: var(--red); letter-spacing: 1px; }
        
        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 10px; }
        .stat-card { background: var(--card); padding: 12px; border-radius: 8px; border: 1px solid var(--border); text-align: center; }
        .stat-value { font-size: 22px; font-weight: 900; display: block; }
        .stat-label { font-size: 10px; color: #666; text-transform: uppercase; }

        .table-container { padding: 0 20px 20px 20px; }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; }
        
        thead th { 
            position: sticky; 
            top: 135px;
            z-index: 900;
            background: #1a1a1a; 
            color: #888; 
            padding: 12px; 
            font-size: 10px; 
            text-transform: uppercase; 
            text-align: left;
            border-bottom: 2px solid var(--border);
        }

        tbody td { padding: 12px; border-bottom: 1px solid #1a1a1a; vertical-align: middle; }

        @keyframes blink {
            0% { background-color: var(--green); color: black; }
            50% { background-color: var(--red); color: white; }
            100% { background-color: var(--green); color: black; }
        }
        .badge-600 { 
            animation: blink 1.5s infinite; 
            padding: 5px 10px; 
            border-radius: 4px; 
            font-weight: 900; 
            font-size: 11px; 
            cursor: pointer;
        }

        .airline-logo { width: 30px; height: 30px; border-radius: 4px; vertical-align: middle; margin-right: 8px; background: white; padding: 2px; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .status-active { background: var(--blue); color: white; }
        .status-landed { background: var(--green); color: black; }
        .status-scheduled { background: #333; color: #eee; }
        .status-cancelled { background: var(--red); color: white; }
        
        .time-block { font-family: 'Courier New', monospace; line-height: 1.2; font-size: 12px; }
        .time-label { font-size: 9px; color: #555; margin-right: 4px; }
        #countdown { color: var(--orange); font-weight: bold; }
    </style>
</head>
<body>

<div class="top-container">
    <div class="header">
        <div class="logo-main">🏹 ROBIN DES AIRS <span style="font-size: 12px; font-weight: 400; color: #666;">| V6.3 CASH OPTIMIZER</span></div>
        <div>Refresh : <span id="countdown">20:00</span></div>
    </div>

    <div class="dashboard">
        <div class="stat-card" style="border-top: 3px solid var(--red);"><span id="count-critical" class="stat-value">0</span><span class="stat-label">Vols Critiques</span></div>
        <div class="stat-card" style="border-top: 3px solid var(--green);"><span id="total-cash" class="stat-value" style="color:var(--green)">0 €</span><span class="stat-label">Cash Potentiel (5%)</span></div>
        <div class="stat-card" style="border-top: 3px solid var(--blue);"><span id="total-vols" class="stat-value">0</span><span class="stat-label">Vols Afrique-EU</span></div>
        <div class="stat-card" style="border-top: 3px solid var(--orange);"><span id="live-time" class="stat-value">--:--</span><span class="stat-label">Heure UTC (Z)</span></div>
    </div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>Vol / Cie</th>
                <th>Appareil</th>
                <th>Trajet</th>
                <th>Escale</th>
                <th>Décollage (S/A)</th>
                <th>Arrivée (S/E/A)</th>
                <th>Statut</th>
                <th>Retard</th>
                <th>Cash Est.</th>
            </tr>
        </thead>
        <tbody id="flight-list">
            <tr><td colspan="9" style="text-align:center; padding:100px; color:#555;">Démarrage des systèmes...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const p1 = 'ea71e3'; const p2 = 'c99347'; const API_KEY = p1 + '-' + p2;
    const EU_HUBS = ['CDG','ORY','BRU','AMS','LIS','MAD','FRA','LHR','BCN'];
    const AF_HUBS = ['DSS','ABJ','BKO','CKY','OUA','LFW','ACC','ABV','LOS','COO','NKC','NIM','FNA','ROB','DLA','NSI','LBV','FIH','BZV','PNR','BGF','LAD','SSG','NDJ','NBO','DAR','ADD','JNB','CPT','KGL','JIB','ZNZ','TNR','MRU','RUN','DZA'];
    const EU_AIRLINES = ['AF','SN','KL','LH','TP','IB','BA','VY','TO'];

    let timerSec = 1200;

    function formatT(isoStr) {
        if (!isoStr) return "--:--";
        const date = new Date(isoStr);
        return date.getUTCHours().toString().padStart(2, '0') + ":" + date.getUTCMinutes().toString().padStart(2, '0');
    }

    function updateClock() {
        document.getElementById('live-time').innerText = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit', timeZone: 'UTC'}) + " Z";
        let m = Math.floor(timerSec / 60);
        let s = timerSec % 60;
        document.getElementById('countdown').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timerSec <= 0) { timerSec = 1200; lancerScan(); }
        timerSec--;
    }
    setInterval(updateClock, 1000);

    async function lancerScan() {
        const list = document.getElementById('flight-list');
        list.innerHTML = "<tr><td colspan='9' style='text-align:center; padding:100px;'>Mise à jour des données en cours...</td></tr>";
        
        try {
            const calls = [...EU_HUBS, ...AF_HUBS].map(h => 
                fetch(`https://aviation-edge.com/v2/public/timetable?key=${API_KEY}&iataCode=${h}&type=arrival`).then(r => r.json()).catch(() => [])
            );
            const results = await Promise.all(calls);
            
            let rawFlights = results.flat().filter(f => {
                if (!f.arrival || !f.departure || !f.airline) return false;
                const isEuAirline = EU_AIRLINES.includes(f.airline.iataCode);
                const isEuToAf = EU_HUBS.includes(f.departure.iataCode) && AF_HUBS.includes(f.arrival.iataCode);
                const isAfToEu = AF_HUBS.includes(f.departure.iataCode) && EU_HUBS.includes(f.arrival.iataCode);
                return isEuAirline && (isEuToAf || isAfToEu);
            });

            const uniqueFlights = new Map();
            rawFlights.forEach(f => {
                const isMarketing = f.flight && f.flight.codeshared && f.flight.codeshared.airline;
                const operatingIata = isMarketing ? f.flight.codeshared.airline.iataCode : f.airline.iataCode;
                const uniqueKey = `${f.arrival.scheduledTime}_${f.departure.iataCode}_${f.arrival.iataCode}`;
                if (!uniqueFlights.has(uniqueKey)) {
                    f.realOperator = operatingIata;
                    uniqueFlights.set(uniqueKey, f);
                }
            });

            const finalFlights = Array.from(uniqueFlights.values());
            finalFlights.sort((a,b) => (b.arrival.delay || 0) - (a.arrival.delay || 0));

            list.innerHTML = "";
            let crits = 0;
            const criticalForTelegram = [];

            finalFlights.forEach(f => {
                const delay = f.arrival.delay || 0;
                const isCrit = (delay >= 180 || f.status === 'cancelled');
                if (isCrit) {
                    crits++;
                    criticalForTelegram.push({
                        flight: f.flight?.iataNumber || f.flight?.iata || '—',
                        dep: f.departure?.iataCode || '—',
                        arr: f.arrival?.iataCode || '—',
                        cancelled: f.status === 'cancelled',
                        delayMinutes: delay,
                        airline: f.realOperator || f.airline?.iataCode || '—',
                        scheduledDeparture: formatT(f.departure?.scheduledTime) + 'Z',
                        scheduledArrival: formatT(f.arrival?.scheduledTime) + 'Z',
                        statusFr: f.status === 'cancelled' ? 'Annulé' : (f.status === 'active' ? 'En vol' : (f.status === 'landed' ? 'Atterri' : (f.status || '—')))
                    });
                }
                
                let statusClass = "status-scheduled";
                let statusLabel = f.status;
                if(f.status === 'active') { statusClass = "status-active"; statusLabel = "En Vol"; }
                if(f.status === 'landed') { statusClass = "status-landed"; statusLabel = "Atterri"; }
                if(f.status === 'cancelled') { statusClass = "status-cancelled"; statusLabel = "Annulé"; }

                const logoUrl = `https://www.gstatic.com/flights/airline_logos/70px/${f.realOperator}.png`;

                list.innerHTML += `<tr>
                    <td>
                        <img src="${logoUrl}" class="airline-logo" onerror="this.style.display='none'">
                        <b>${f.flight.iataNumber}</b>
                    </td>
                    <td><small>${f.aircraft?.icaoCode || "N/A"}</small><br><small style="color:var(--blue)">${f.aircraft?.regNumber || "N/A"}</small></td>
                    <td><b>${f.departure.iataCode}</b> ➔ <b>${f.arrival.iataCode}</b></td>
                    <td><small>${f.departure.iataCode === 'CDG' && f.arrival.iataCode === 'NIM' ? 'Via OUA' : 'Direct'}</small></td>
                    <td class="time-block">
                        <span class="time-label">S:</span>${formatT(f.departure.scheduledTime)}<br>
                        <span class="time-label">A:</span><span style="color:var(--orange)">${formatT(f.departure.actualTime)}</span>
                    </td>
                    <td class="time-block">
                        <span class="time-label">S:</span>${formatT(f.arrival.scheduledTime)}<br>
                        <span class="time-label">A:</span><span style="color:var(--green)">${formatT(f.arrival.actualTime)}</span>
                    </td>
                    <td><span class="status-badge ${statusClass}">${statusLabel}</span></td>
                    <td style="color:${delay > 0 ? 'var(--red)' : 'inherit'}"><b>${delay} min</b></td>
                    <td>${isCrit ? '<span class="badge-600">9 600 €</span>' : '--'}</td>
                </tr>`;
            });

            document.getElementById('count-critical').innerText = crits;
            const potentialCash = crits * 16 * 600;
            document.getElementById('total-cash').innerText = potentialCash.toLocaleString('fr-FR') + " €";
            document.getElementById('total-vols').innerText = finalFlights.length;

            if (criticalForTelegram.length > 0) {
                fetch('/.netlify/functions/telegram-notify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ flights: criticalForTelegram, chat_id: '6894457026' })
                }).catch(function() {});
            }

        } catch (e) { list.innerHTML = "Erreur API."; }
    }
    lancerScan();
</script>
</body>
</html>
