<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBIN DES AIRS — V7 GHOST ANALYTICS</title>
    <style>
        :root { --red: #ff4d4d; --green: #2ecc71; --blue: #3498db; --orange: #f39c12; --bg: #050505; --card: #111; --border: #222; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        .top-container { position: sticky; top: 0; z-index: 1000; background: var(--bg); padding: 15px 20px; border-bottom: 2px solid var(--border); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo-main { font-size: 22px; font-weight: 900; color: var(--red); letter-spacing: 1px; }
        
        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .stat-card { background: var(--card); padding: 12px; border-radius: 8px; border: 1px solid var(--border); text-align: center; }
        .stat-value { font-size: 22px; font-weight: 900; display: block; }
        .stat-label { font-size: 10px; color: #666; text-transform: uppercase; }

        .controls { display: flex; align-items: center; gap: 15px; }
        .btn-refresh { background: var(--red); color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-refresh:hover { background: #cc0000; transform: scale(1.05); }

        .table-container { padding: 20px; }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; }
        thead th { position: sticky; top: 145px; z-index: 900; background: #1a1a1a; color: #888; padding: 12px; font-size: 10px; text-transform: uppercase; text-align: left; border-bottom: 2px solid var(--border); }
        tbody td { padding: 12px; border-bottom: 1px solid #1a1a1a; vertical-align: middle; }

        .return-row { background: rgba(52, 152, 219, 0.05) !important; font-size: 12px; color: #aaa; }
        .return-tag { color: var(--blue); font-weight: bold; font-size: 10px; text-transform: uppercase; margin-right: 5px; }

        @keyframes blink { 0% { background: var(--green); } 50% { background: var(--red); } 100% { background: var(--green); } }
        .badge-600 { animation: blink 1s infinite; padding: 5px 10px; border-radius: 4px; font-weight: 900; color: white; font-size: 11px; }
        
        .airline-logo { width: 28px; height: 28px; border-radius: 4px; vertical-align: middle; margin-right: 8px; background: white; padding: 2px; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .status-active { background: var(--blue); color: white; }
        .status-landed { background: var(--green); color: black; }
        .status-scheduled { background: #333; color: #eee; }
        .status-cancelled { background: var(--red); color: white; }
        .time-block { font-family: 'Courier New', monospace; line-height: 1.2; font-size: 12px; }
        .reg-tag { font-size: 10px; color: var(--blue); font-weight: bold; background: rgba(52,152,219,0.1); padding: 2px 4px; border-radius: 3px; }
    </style>
</head>
<body>

<div class="top-container">
    <div class="header">
        <div class="logo-main">🏹 ROBIN DES AIRS <span style="font-size: 12px; font-weight: 400; color: #666;">| V7 GHOST ANALYTICS</span></div>
        <div class="controls">
            <button class="btn-refresh" onclick="lancerScan()">🔄 Rafraîchir</button>
            <button class="btn-refresh" style="background:var(--green);" onclick="copierMessage('general')" title="Copie un message général (sans vol)">📋 Message général</button>
            <div style="font-size: 12px;">Auto-Update: <span id="countdown" style="color:var(--orange)">20:00</span></div>
        </div>
    </div>

    <div class="dashboard">
        <div class="stat-card" style="border-top: 3px solid var(--red);"><span id="count-critical" class="stat-value">0</span><span class="stat-label">Vols Critiques</span></div>
        <div class="stat-card" style="border-top: 3px solid var(--green);"><span id="total-cash" class="stat-value" style="color:var(--green)">0 €</span><span class="stat-label">Potentiel (16 pax/vol)</span></div>
        <div class="stat-card" style="border-top: 3px solid var(--blue);"><span id="total-vols" class="stat-value">0</span><span class="stat-label">Vols Traqués</span></div>
        <div class="stat-card" style="border-top: 3px solid var(--orange);"><span id="live-time" class="stat-value">--:--</span><span class="stat-label">UTC Time (Z)</span></div>
    </div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Vol / Opérateur</th>
                <th>Appareil (Reg)</th>
                <th>Trajet</th>
                <th>Décollage (S/A)</th>
                <th>Arrivée (S/A)</th>
                <th>Statut</th>
                <th>Retard</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="flight-list">
            <tr><td colspan="9" style="text-align:center; padding:100px;">Chargement du radar...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const p1 = 'ea71e3'; const p2 = 'c99347'; const API_KEY = p1 + '-' + p2;
    const EU_HUBS = ['CDG','ORY','BRU','AMS','LIS','MAD','FRA','LHR','BCN'];
    const AF_HUBS = ['DSS','ABJ','BKO','CKY','OUA','LFW','ACC','ABV','LOS','COO','NKC','NIM','FNA','ROB','DLA','NSI','LBV','FIH','BZV','PNR','BGF','LAD','SSG','NDJ','NBO','DAR','ADD','JNB','CPT','KGL','JIB','ZNZ','TNR','MRU','RUN','DZA'];
    const EU_AIRLINES = ['AF','SN','KL','LH','TP','IB','BA','VY','TO'];

    let timerSec = 1200;

    function formatDate(isoStr) {
        if (!isoStr) return "—";
        const d = new Date(isoStr);
        return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: '2-digit' });
    }

    function formatT(isoStr) {
        if (!isoStr) return "--:--";
        const date = new Date(isoStr);
        return date.getUTCHours().toString().padStart(2, '0') + ":" + date.getUTCMinutes().toString().padStart(2, '0');
    }

    function updateClock() {
        document.getElementById('live-time').innerText = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', timeZone: 'UTC' }) + " Z";
        let m = Math.floor(timerSec / 60);
        let s = timerSec % 60;
        document.getElementById('countdown').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timerSec <= 0) { timerSec = 1200; lancerScan(); }
        timerSec--;
    }
    setInterval(updateClock, 1000);

    async function lancerScan() {
        const list = document.getElementById('flight-list');
        list.innerHTML = "<tr><td colspan='9' style='text-align:center; padding:100px;'>Mise à jour des données...</td></tr>";
        
        try {
            const calls = [...EU_HUBS, ...AF_HUBS].map(h => 
                fetch(`https://aviation-edge.com/v2/public/timetable?key=${API_KEY}&iataCode=${h}&type=arrival`).then(r => r.json()).catch(() => [])
            );
            const results = await Promise.all(calls);
            
            let rawFlights = results.flat().filter(f => {
                if (!f.arrival || !f.departure || !f.airline) return false;
                const isEuAirline = EU_AIRLINES.includes(f.airline.iataCode);
                const isEuToAf = EU_HUBS.includes(f.departure.iataCode) && AF_HUBS.includes(f.arrival.iataCode);
                const isAfToEu = AF_HUBS.includes(f.departure.iataCode) && EU_HUBS.includes(f.arrival.iataCode);
                return isEuAirline && (isEuToAf || isAfToEu);
            });

            const uniqueFlights = new Map();
            rawFlights.forEach(f => {
                const isMarketing = f.flight && f.flight.codeshared && f.flight.codeshared.airline;
                const operatingIata = isMarketing ? f.flight.codeshared.airline.iataCode : f.airline.iataCode;
                const uniqueKey = `${f.arrival.scheduledTime}_${f.departure.iataCode}_${f.arrival.iataCode}`;
                if (!uniqueFlights.has(uniqueKey)) {
                    f.realOperator = operatingIata;
                    uniqueFlights.set(uniqueKey, f);
                }
            });

            const finalFlights = Array.from(uniqueFlights.values());
            finalFlights.sort((a,b) => (b.arrival.delay || 0) - (a.arrival.delay || 0));

            list.innerHTML = "";
            let crits = 0;
            const criticalForTelegram = [];

            finalFlights.forEach(f => {
                const delay = f.arrival.delay || 0;
                const isCrit = (delay >= 180 || f.status === 'cancelled');
                if (isCrit) {
                    crits++;
                    criticalForTelegram.push({
                        flight: f.flight?.iataNumber || f.flight?.iata || '—',
                        dep: f.departure?.iataCode || '—',
                        arr: f.arrival?.iataCode || '—',
                        cancelled: f.status === 'cancelled',
                        delayMinutes: delay,
                        airline: f.realOperator || f.airline?.iataCode || '—',
                        scheduledDeparture: formatT(f.departure?.scheduledTime) + 'Z',
                        scheduledArrival: formatT(f.arrival?.scheduledTime) + 'Z',
                        statusFr: f.status === 'cancelled' ? 'Annulé' : (f.status === 'active' ? 'En vol' : (f.status === 'landed' ? 'Atterri' : (f.status || '—')))
                    });
                }
                
                let statusClass = "status-scheduled";
                let statusLabel = f.status;
                if (f.status === 'active') { statusClass = "status-active"; statusLabel = "En Vol"; }
                if (f.status === 'landed') { statusClass = "status-landed"; statusLabel = "Atterri"; }
                if (f.status === 'cancelled') { statusClass = "status-cancelled"; statusLabel = "Annulé"; }

                const logoUrl = `https://www.gstatic.com/flights/airline_logos/70px/${f.realOperator}.png`;
                const depDate = formatDate(f.departure?.scheduledTime);

                list.innerHTML += `<tr>
                    <td>${depDate}</td>
                    <td>
                        <img src="${logoUrl}" class="airline-logo" onerror="this.style.display='none'">
                        <b>${f.flight.iataNumber}</b><br><small style="color:#666">${f.realOperator}</small>
                    </td>
                    <td><small>${f.aircraft?.icaoCode || "N/A"}</small><br><span class="reg-tag">${f.aircraft?.regNumber || "—"}</span></td>
                    <td><b>${f.departure.iataCode}</b> ➔ <b>${f.arrival.iataCode}</b></td>
                    <td class="time-block">S: ${formatT(f.departure.scheduledTime)}<br>A: <span style="color:var(--orange)">${formatT(f.departure.actualTime)}</span></td>
                    <td class="time-block">S: ${formatT(f.arrival.scheduledTime)}<br>A: <span style="color:var(--green)">${formatT(f.arrival.actualTime)}</span></td>
                    <td><span class="status-badge ${statusClass}">${statusLabel}</span></td>
                    <td style="color:${delay > 0 ? 'var(--red)' : 'inherit'}"><b>${delay} min</b></td>
                    <td>${isCrit ? `<span class="badge-600">9 600 €</span> <button class="btn-refresh" style="margin-left:6px;padding:4px 8px;font-size:10px;" onclick="copierMessage('spec','${f.flight.iataNumber}',${delay},'${f.departure.iataCode} → ${f.arrival.iataCode}')" title="Copier un message spécifique à ce vol">📋</button>` : '—'}</td>
                </tr>`;
            });

            document.getElementById('count-critical').innerText = crits;
            const potentialCash = crits * 16 * 600;
            document.getElementById('total-cash').innerText = potentialCash.toLocaleString('fr-FR') + " €";
            document.getElementById('total-vols').innerText = finalFlights.length;

            if (criticalForTelegram.length > 0) {
                fetch('/.netlify/functions/telegram-notify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ flights: criticalForTelegram, chat_id: '6894457026' })
                }).catch(function() {});
            }

        } catch (e) { list.innerHTML = "<tr><td colspan='9' style='text-align:center; padding:40px; color:var(--red);'>Erreur API.</td></tr>"; }
    }

    // --- GÉNÉRATEUR DE MESSAGES PROFESSIONNELS (SANS FRAIS CACHÉS) ---
    function copierMessage(type, vol, retard, trajet) {
        const url = "https://robindesairs.eu";
        const messagesGen = [
            `🏹 ROBIN DES AIRS : Votre vol Afrique-Europe a +3h de retard ? Récupérez 600€ sans avance de frais. On s'occupe de tout : ${url}`,
            `⚠️ Vol retardé ? Ne laissez pas 600€ à la compagnie. Commission transparente, zéro frais cachés. Vérifiez ici : ${url}`,
            `🚀 Marre d'attendre ? Transformez votre retard en cash. Pas de succès, pas de frais. L'expertise Robin des Airs : ${url}`,
            `💸 Plus de 3h de retard ? La loi vous doit 600€. Dossier géré de A à Z sans sortir votre carte bleue : ${url}`,
            `🏹 Spécialiste des vols Afrique : récupérez votre indemnité légale simplement. Zéro frais si on ne gagne pas : ${url}`
        ];
        const messagesSpec = [
            `🎯 Vol ${vol} (${trajet}) : Retard de ${retard} min. Passagers, vous êtes éligibles à 600€. Zéro avance de frais avec Robin des Airs.`,
            `⚠️ Alerte ${vol} : Votre retard de ${retard} min vous donne droit à 600€. On gère votre dossier sans frais cachés. DM pour info !`,
            `🔎 Retard détecté sur le vol ${vol}. Ne perdez pas vos 600€ d'indemnité. Expertise Robin des Airs, zéro frais d'entrée : ${url}`,
            `🔥 Passagers du ${vol} : Le retard dépasse les 3h. La loi vous doit 600€. On récupère votre cash, on se rémunère au succès. ${url}`,
            `🎯 Avis au vol ${vol} : Votre retard est éligible à 600€. Paiement au résultat uniquement, pas de frais cachés. Infos ici : ${url}`
        ];
        const list = (type === 'general') ? messagesGen : messagesSpec;
        const randomMsg = list[Math.floor(Math.random() * list.length)];
        navigator.clipboard.writeText(randomMsg).then(function() {
            const n = document.createElement('div');
            n.innerHTML = "✅ Message 'Transparent' Copié !";
            n.style.cssText = "position:fixed;bottom:20px;right:20px;background:#2ecc71;color:black;padding:12px;border-radius:8px;font-weight:900;z-index:2000;";
            document.body.appendChild(n);
            setTimeout(function() { n.remove(); }, 2500);
        });
    }

    lancerScan();
</script>
</body>
</html>
