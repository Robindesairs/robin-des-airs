<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radar vols Afrique–Europe — Robin des Airs</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0B1F3A; color: #e2e8f0; min-height: 100vh; padding: 20px; }
    h1 { font-size: 1.35rem; margin-bottom: 8px; color: #00E5A0; }
    .legend { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
    .legend span { display: inline-flex; align-items: center; gap: 6px; }
    .toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 16px; }
    select { padding: 8px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: #fff; font-size: 14px; }
    select option { background: #1e293b; color: #fff; }
    .btn { padding: 8px 16px; border-radius: 6px; border: none; background: #00E5A0; color: #0B1F3A; font-weight: 600; cursor: pointer; font-size: 13px; }
    .btn:hover { background: #00c78a; }
    .meta { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.08); }
    th { color: rgba(255,255,255,0.6); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    tr:hover { background: rgba(255,255,255,0.03); }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; }
    .badge-RED { background: #dc2626; color: #fff; }
    .badge-ORANGE { background: #ea580c; color: #fff; }
    .badge-YELLOW { background: #ca8a04; color: #fff; }
    .badge-GREEN { background: #16a34a; color: #fff; }
    .badge-GREY { background: #64748b; color: #fff; }
    .err { color: #f87171; margin-top: 12px; }
    .loading { color: rgba(255,255,255,0.5); margin-top: 12px; }
  </style>
</head>
<body>
  <div id="gate" style="display:none; max-width:320px; margin:40px auto; text-align:center;">
    <p style="margin-bottom:16px; color:rgba(255,255,255,0.8);">Accès privé — Radar Dakar</p>
    <input type="password" id="pwd" placeholder="Mot de passe" style="width:100%; padding:12px; border-radius:6px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.08); color:#fff; font-size:14px; margin-bottom:10px;">
    <button type="button" class="btn" id="btn-unlock">Accéder</button>
    <p id="gate-err" style="font-size:12px; color:#f87171; margin-top:8px; display:none;">Mot de passe incorrect.</p>
  </div>
  <div id="radar-content" style="display:none;">
  <h1>Radar vols Afrique – Europe · Dakar</h1>
  <div class="legend">
    <span><strong>Priorité en haut du tableau :</strong></span>
    <span class="badge badge-RED">ROUGE ≥ 2h30</span>
    <span class="badge badge-ORANGE">ORANGE 1h–2h30</span>
    <span class="badge badge-YELLOW">JAUNE ~1h (à surveiller)</span>
    <span class="badge badge-GREEN">Vert &lt; 30 min</span>
    <span class="badge badge-GREY">Gris (hors périmètre)</span>
  </div>
  <p class="meta">Rafraîchissement auto : 5 min.</p>

  <div class="toolbar">
    <label>
      Aéroport
      <select id="airport">
        <option value="DSS" selected>DSS — Dakar</option>
        <option value="CDG">CDG — Paris CDG</option>
        <option value="ORY">ORY — Paris Orly</option>
        <option value="MRS">MRS — Marseille</option>
        <option value="LYS">LYS — Lyon</option>
        <option value="BRU">BRU — Bruxelles</option>
        <option value="CMN">CMN — Casablanca</option>
      </select>
    </label>
    <label>
      Type
      <select id="type">
        <option value="departure">Départs</option>
        <option value="arrival">Arrivées</option>
      </select>
    </label>
    <button class="btn" id="btn-refresh">Rafraîchir</button>
    <span class="meta" id="updated"></span>
  </div>

  <div id="out"></div>
  <div id="status" class="loading"></div>
  </div>

  <script>
    var refreshTimer;
    var RADAR_PWD = 'robin-dakar'; // Mot de passe privé — à changer si besoin

    function checkAccess() {
      try {
        return sessionStorage.getItem('radar_ok') === '1';
      } catch (e) { return false; }
    }
    function setAccess(ok) {
      try { sessionStorage.setItem('radar_ok', ok ? '1' : '0'); } catch (e) {}
    }

    function showGate() {
      document.getElementById('gate').style.display = 'block';
      document.getElementById('radar-content').style.display = 'none';
    }
    function showRadar() {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('radar-content').style.display = 'block';
    }

    function api() {
      var airport = document.getElementById('airport').value;
      var type = document.getElementById('type').value;
      return fetch('/.netlify/functions/radar?airport=' + encodeURIComponent(airport) + '&type=' + encodeURIComponent(type))
        .then(function(r) { return r.json(); });
    }

    function render(data) {
      var out = document.getElementById('out');
      var status = document.getElementById('status');
      out.innerHTML = '';
      status.textContent = '';

      if (data.error && !data.flights) {
        status.className = 'err';
        status.textContent = data.error;
        return;
      }

      document.getElementById('updated').textContent = 'Dernière MAJ : ' + (data.updatedAt ? new Date(data.updatedAt).toLocaleTimeString('fr-FR') : '—');

      if (!data.flights || data.flights.length === 0) {
        status.className = 'meta';
        status.textContent = 'Aucun vol retourné. Vérifiez la clé API ou l’aéroport.';
        return;
      }

      var table = '<table><thead><tr><th>Vol</th><th>Compagnie</th><th>Départ</th><th>Arrivée</th><th>Retard</th><th>Éligible</th><th>Signal</th></tr></thead><tbody>';
      data.flights.forEach(function(f) {
        table += '<tr>' +
          '<td>' + (f.flight || '—') + '</td>' +
          '<td>' + (f.airline || '—') + '</td>' +
          '<td>' + (f.dep || '—') + '</td>' +
          '<td>' + (f.arr || '—') + '</td>' +
          '<td>' + (f.delayMinutes != null ? f.delayMinutes + ' min' : '—') + '</td>' +
          '<td>' + (f.eligible ? 'Oui' : 'Non') + '</td>' +
          '<td><span class="badge badge-' + (f.color || 'GREY') + '">' + (f.color || 'GREY') + '</span></td>' +
          '</tr>';
      });
      table += '</tbody></table>';
      out.innerHTML = table;
    }

    function load() {
      var status = document.getElementById('status');
      status.className = 'loading';
      status.textContent = 'Chargement…';
      api().then(function(data) {
        render(data);
      }).catch(function(e) {
        status.className = 'err';
        status.textContent = 'Erreur : ' + (e.message || 'réseau');
      });
    }

    document.getElementById('btn-refresh').addEventListener('click', load);
    document.getElementById('airport').addEventListener('change', load);
    document.getElementById('type').addEventListener('change', load);

    if (checkAccess()) {
      showRadar();
      load();
      refreshTimer = setInterval(load, 5 * 60 * 1000);
    } else {
      showGate();
      document.getElementById('btn-unlock').onclick = function() {
        var pwd = document.getElementById('pwd').value;
        var err = document.getElementById('gate-err');
        if (pwd === RADAR_PWD) {
          setAccess(true);
          err.style.display = 'none';
          showRadar();
          load();
          refreshTimer = setInterval(load, 5 * 60 * 1000);
        } else {
          err.style.display = 'block';
        }
      };
      document.getElementById('pwd').onkeydown = function(e) {
        if (e.key === 'Enter') document.getElementById('btn-unlock').click();
      };
    }
  </script>
</body>
</html>
