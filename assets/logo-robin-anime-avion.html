<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robin des Airs — Logo animé (avion)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  .stage {
    width: 1080px;
    height: 1080px;
    max-width: min(1080px, 100vmin);
    max-height: min(1080px, 100vmin);
    background: #0B1F3A;
    border-radius: 24px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,.45);
  }
  .center {
    position: absolute;
    left: 50%;
    top: 56%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 2;
  }
  .bow {
    width: 72px;
    height: 48px;
    margin: 0 auto 20px;
  }
  .bow svg { width: 100%; height: 100%; display: block; }
  .brand-robin {
    font-size: 88px;
    font-weight: 800;
    letter-spacing: 0.06em;
    color: #fff;
    line-height: 1;
  }
  .brand-sub {
    font-size: 52px;
    font-weight: 700;
    color: #7FD4B0;
    margin-top: 8px;
  }
  .brand-sub em { font-style: italic; font-weight: 600; }

  .orbit-wrap {
    position: absolute;
    left: 50%;
    top: 36%;
    width: 480px;
    height: 480px;
    margin-left: -240px;
    margin-top: -240px;
    animation: orbit-spin 4.5s linear infinite;
    z-index: 1;
  }
  @keyframes orbit-spin {
    to { transform: rotate(360deg); }
  }
  .orbit-ring {
    position: absolute;
    inset: 0;
    border: 2px dashed rgba(127, 212, 176, 0.2);
    border-radius: 50%;
    pointer-events: none;
  }
  .plane-slot {
    position: absolute;
    left: 50%;
    top: 0;
    transform: translate(-50%, -50%);
  }
  .plane {
    width: 110px;
    height: 110px;
    transform: rotate(90deg);
    filter: drop-shadow(0 6px 16px rgba(0,0,0,.4));
  }
  .plane svg { width: 100%; height: 100%; display: block; }

  .hint {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: rgba(255,255,255,.45);
    text-align: center;
    max-width: 90vw;
  }
  @media (prefers-reduced-motion: reduce) {
    .orbit-wrap { animation: none; }
    .plane-slot { top: 8%; }
  }
</style>
</head>
<body>
  <div class="stage" role="img" aria-label="Robin des Airs, avion en orbite au-dessus du logo">
    <div class="orbit-wrap">
      <div class="orbit-ring" aria-hidden="true"></div>
      <div class="plane-slot">
        <div class="plane" aria-hidden="true">
          <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 12 L54 36 H82 L58 44 L66 84 L50 72 L34 84 L42 44 L18 36 H46 Z" fill="#fff"/>
            <ellipse cx="50" cy="44" rx="14" ry="22" fill="#7FD4B0"/>
            <path d="M12 44 H88" stroke="#7FD4B0" stroke-width="6" stroke-linecap="round"/>
            <path d="M88 44 L98 38 V50 L88 44Z" fill="#7FD4B0"/>
            <circle cx="50" cy="44" r="6" fill="#0B1F3A"/>
          </svg>
        </div>
      </div>
    </div>

    <div class="center">
      <div class="bow" aria-hidden="true">
        <svg viewBox="0 0 80 50" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 42C12 20 28 8 40 8s28 12 28 34" stroke="#7FD4B0" stroke-width="4" stroke-linecap="round"/>
          <path d="M8 25h64" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
          <path d="M68 25l-6-4v8l6-4z" fill="#fff"/>
        </svg>
      </div>
      <div class="brand-robin">ROBIN</div>
      <div class="brand-sub"><em>des</em> Airs</div>
    </div>
  </div>

  <p class="hint">Ouvrir dans le navigateur · enregistrer en vidéo ou GIF (OBS, zone 1080×1080) pour YouTube</p>
</body>
</html>
