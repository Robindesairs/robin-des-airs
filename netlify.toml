# Robin des Airs — configuration Netlify
# Publier la racine du dépôt (index.html, 404.html, _redirects sont ici)
# Fonctions serverless : netlify/functions/ (ex. airport-search pour API Amadeus)
#
# HTTPS / Cadenas : redirection permanente HTTP → HTTPS pour afficher le cadenas.
# Si le cadenas n'apparaît pas : 1) ouvrir https://robindesairs.eu (pas http)
# 2) Netlify → Domain management → HTTPS → activer "Force TLS connection"
[functions]
  directory = "netlify/functions"
  # nft trace les require au chargement du module ; esbuild omettait @netlify/blobs dans le zip
  node_bundler = "nft"

# Relais Gemini après ~20s sans réponse humaine (traitement toutes les minutes)
[functions."whatsapp-gemini-fallback"]
  schedule = "* * * * *"

[build]
  publish = "."
  # S'assurer que les deps (dont @netlify/blobs) sont présentes avant le bundle des fonctions
  command = "npm install && npm install --prefix netlify/functions && npm run build:sitemap && npm run build:blog"

# Forcer HTTPS (cadenas) : toute requête en http est redirigée en https
[[redirects]]
  from = "http://robindesairs.eu/*"
  to = "https://robindesairs.eu/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.robindesairs.eu/*"
  to = "https://robindesairs.eu/:splat"
  status = 301
  force = true

