# Robin des Airs — configuration Netlify
# Publier la racine du dépôt (index.html, 404.html, _redirects sont ici)
# Fonctions serverless : netlify/functions/ (ex. airport-search pour API Amadeus)
#
# HTTPS : Netlify sert déjà le site en https. Pour forcer la redirection
#         http → https, active "Force TLS" dans le dashboard :
#         Domain management → HTTPS → "Force TLS connection" (ou "Redirect HTTP to HTTPS").
# Fonctions serverless : netlify/functions/ (JS). Les fichiers api/*.ts sont pour un autre runtime (ex. Vercel / Node).
# [functions]
#   directory = "netlify/functions"  # défaut Netlify si non précisé

[build]
  publish = "."
  command = ""

# Redirections pour URLs sans .html (optionnel)
[[redirects]]
  from = "/choix-reclamation"
  to = "/choix-reclamation.html"
  status = 200

[[redirects]]
  from = "/dossier"
  to = "/dossier.html"
  status = 200

[[redirects]]
  from = "/guide-whatsapp"
  to = "/guide-whatsapp.html"
  status = 200

[[redirects]]
  from = "/suivi-dossier"
  to = "/suivi-dossier.html"
  status = 200

[[redirects]]
  from = "/cgv"
  to = "/cgv.html"
  status = 200

[[redirects]]
  from = "/politique-confidentialite"
  to = "/politique-confidentialite.html"
  status = 200

[[redirects]]
  from = "/mandat-representation"
  to = "/mandat-representation.html"
  status = 200

[[redirects]]
  from = "/droit-retractation"
  to = "/droit-retractation.html"
  status = 200

# Webhook WhatsApp 360dialog
[[redirects]]
  from = "/api/whatsapp-webhook"
  to = "/.netlify/functions/whatsapp-webhook"
  status = 200

# Statut connexion WhatsApp (vérification rapide)
[[redirects]]
  from = "/api/whatsapp-status"
  to = "/.netlify/functions/whatsapp-status"
  status = 200

# Page 404 personnalisée (créer 404.html si vous en voulez une)
