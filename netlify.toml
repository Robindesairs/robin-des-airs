# Robin des Airs — configuration Netlify
# Publier la racine du dépôt (index.html, 404.html, _redirects sont ici)
# Fonctions serverless : netlify/functions/ (ex. airport-search pour API Amadeus)
#
# HTTPS / Cadenas : redirection permanente HTTP → HTTPS pour afficher le cadenas.
# Si le cadenas n'apparaît pas : 1) ouvrir https://robindesairs.eu (pas http)
# 2) Netlify → Domain management → HTTPS → activer "Force TLS connection"
[functions]
  directory = "netlify/functions"
  # nft trace les require au chargement du module ; esbuild omettait @netlify/blobs dans le zip
  node_bundler = "nft"
  # Timeout synchrone max 26 s (plan standard). Valeur 60 dans ce fichier fait echouer le deploy.

# Relais Gemini après ~20s sans réponse humaine (traitement toutes les minutes)
[functions."whatsapp-gemini-fallback"]
  schedule = "* * * * *"

# ad-watch : arrête la pub si vol décollé ou 6h écoulées
[functions."ad-watch"]
  schedule = "*/10 * * * *"

# AeroDataBox : seul le scan manuel radar-vols-v2 → /.netlify/functions/radar reste actif.
# Crons désactivés (quota). Réactiver : RADAR_BACKGROUND_API=1 + décommenter les schedule ci-dessous.

# [functions."daily-radar-snapshot-background"]
#   schedule = "0 6 * * *"

[functions."radar"]
  timeout = 26

# [functions."radar-veille-cron"]
#   schedule = "*/5 * * * *"

[functions."radar-veille-config"]
  timeout = 10

# Malik réveillé — surveillance vols + alertes (Telegram/email/CallMeBot).
# Cadence ciblée ~12 runs/jour (matin + après-midi EU + soirée Afrique) ≈ 700 req/j (plan ULTRA OK).
[functions."radar-monitor"]
  schedule = "5 7,16,17,18,19,20,21,22,23,0,1,2 * * *"

# Scan rapproché « heures chaudes » TIER 1 (hubs prioritaires DSS/ABJ) : à :25 et :45
# (le monitor couvre déjà :05) → cadence ~20 min → alertes annulation/retard ≥3h plus fraîches.
# Coût : ~18 scans/j × 2 hubs ≈ +70 req/j. Dédup d'alertes partagée.
[functions."radar-monitor-hot"]
  schedule = "25,45 18,19,20,21,22,23,0,1,2 * * *"

# Scan TIER 2 (autres hubs diaspora, getSecondaryHubs) : à :10 et :55 → écart max ~45 min.
# Décalé des scans tier 1 (:05/:25/:45) pour lisser la charge API. Couvre Accra, Lagos,
# Casa, Bamako, Conakry… Coût ≈ 15 hubs × 18 scans/j ≈ +540 req/j (réglable : liste
# MONITOR_HUBS_SECONDARY, ou cadence ci-dessous).
[functions."radar-monitor-hot2"]
  schedule = "10,55 18,19,20,21,22,23,0,1,2 * * *"

# Rapport matinal WhatsApp 9h15 Paris (= 7h15 UTC en été CEST).
[functions."morning-report"]
  schedule = "15 7 * * *"

[functions."daily-radar-snapshot"]
  timeout = 26

[functions."radar-ticker-refresh"]
  timeout = 26

[functions."vol-ticker"]
  timeout = 26

# Publication Instagram — chaque jour à 7h UTC (9h Paris été / 8h hiver)
[functions."instagram-publisher"]
  schedule = "0 7 * * *"

# Cabinet Me Lefèvre — point juridique quotidien à 7h30 UTC (9h30 Paris été).
# Scanne les dossiers engagés, calcule la file d'actions (MED < 5 j, relance, escalade
# NEB, contentieux, prescription) et pousse un brief WhatsApp si du rouge/orange.
# Lecture seule, human-in-the-loop : aucun envoi compagnie, aucun changement de statut.
[functions."legal-daily"]
  schedule = "30 7 * * *"

# Bureau Robin — point du jour des postes (Aïcha/Sofia/Karim/Léa/Nadia) à 7h35 UTC
# (9h35 Paris été). Calcule reversements à faire, agences à contacter, pièces à relancer,
# rentabilité vs seuil → brief WhatsApp consolidé si actions. Lecture seule, human-in-the-loop.
[functions."bureau-daily"]
  schedule = "35 7 * * *"

# Sofia — prospection d'agences partenaires (OpenStreetMap + Instagram) chaque lundi 7h40 UTC.
# Démarre par Dakar (SN), Abidjan (CI), Banjul (GM) : OSM (agences physiques) + IG (hashtags,
# WhatsApp en légende). Filtre les compagnies aériennes, dédoublonne contre le CRM → liste
# « à contacter » + brief WhatsApp. Import CRM opt-in (?save=1). Lecture seule live pour le bureau.
# Cadence hebdo = alignée sur le quota IG (30 hashtags / 7 j).
[functions."sofia-prospect"]
  schedule = "40 7 * * 1"

[build]
  publish = "."
  # S'assurer que les deps (dont @netlify/blobs) sont présentes avant le bundle des fonctions
  # notify:indexnow en dernier : push les URLs modifiées du jour à Bing/Yandex/Naver
  # (non bloquant — exit 0 même si l'API IndexNow renvoie une erreur)
  command = "npm install && npm install --prefix netlify/functions && npm run build:sitemap && npm run build:blog && npm run build:nav-interne && npm run notify:indexnow"

[context.production.environment]
  RADAR_REPORT_EMAIL = "expert@robindesairs.eu"
  # Espace agence : /espace-agence.html?trial=1 (sans code agence)
  AGENCY_TRIAL_PUBLIC = "true"
  AGENCY_TRIAL_CODE = "GSA-KMS-001"

# Forcer HTTPS (cadenas) : toute requête en http est redirigée en https
[[redirects]]
  from = "http://robindesairs.eu/*"
  to = "https://robindesairs.eu/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.robindesairs.eu/*"
  to = "https://robindesairs.eu/:splat"
  status = 301
  force = true

