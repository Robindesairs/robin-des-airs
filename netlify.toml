# Robin des Airs — configuration Netlify
# Publier la racine du dépôt (index.html, 404.html, _redirects sont ici)
# Fonctions serverless : netlify/functions/ (ex. airport-search pour API Amadeus)
#
# HTTPS / Cadenas : redirection permanente HTTP → HTTPS pour afficher le cadenas.
# Si le cadenas n'apparaît pas : 1) ouvrir https://robindesairs.eu (pas http)
# 2) Netlify → Domain management → HTTPS → activer "Force TLS connection"
[functions]
  directory = "netlify/functions"
  # nft trace les require au chargement du module ; esbuild omettait @netlify/blobs dans le zip
  node_bundler = "nft"
  # Timeout synchrone max 26 s (plan standard). Valeur 60 dans ce fichier fait echouer le deploy.

# Relais Gemini après ~20s sans réponse humaine (traitement toutes les minutes)
[functions."whatsapp-gemini-fallback"]
  schedule = "* * * * *"

# Snapshot quotidien — background function (15 min timeout) — 8h Paris (6h UTC été / 7h UTC hiver)
[functions."daily-radar-snapshot-background"]
  schedule = "0 6 * * *"

# Radar : 8h bandeau+email, 16-17h EU→AF, 18h-2h AF→EU — scan toutes les 10 min.

# Veille radar V2 — 1 hub / 5 min (aller 8h–18h, retour 18h–03h)
[functions."radar"]
  timeout = 26

[functions."radar-veille-cron"]
  schedule = "*/5 * * * *"
  timeout = 26

[functions."radar-veille-config"]
  timeout = 10

[functions."radar-monitor"]
  schedule = "*/10 * * * *"

# Rapport matinal WhatsApp 9h15 Paris (= 7h15 UTC en été CEST).
[functions."morning-report"]
  schedule = "15 7 * * *"

[functions."daily-radar-snapshot"]
  timeout = 26

[functions."radar-ticker-refresh"]
  timeout = 26

[functions."vol-ticker"]
  timeout = 26

# Publication Instagram — chaque jour à 7h UTC (9h Paris été / 8h hiver)
[functions."instagram-publisher"]
  schedule = "0 7 * * *"

[build]
  publish = "."
  # S'assurer que les deps (dont @netlify/blobs) sont présentes avant le bundle des fonctions
  # notify:indexnow en dernier : push les URLs modifiées du jour à Bing/Yandex/Naver
  # (non bloquant — exit 0 même si l'API IndexNow renvoie une erreur)
  command = "npm install && npm install --prefix netlify/functions && npm run build:sitemap && npm run build:blog && npm run build:nav-interne && npm run notify:indexnow"

[context.production.environment]
  RADAR_REPORT_EMAIL = "expert@robindesairs.eu"

# Forcer HTTPS (cadenas) : toute requête en http est redirigée en https
[[redirects]]
  from = "http://robindesairs.eu/*"
  to = "https://robindesairs.eu/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.robindesairs.eu/*"
  to = "https://robindesairs.eu/:splat"
  status = 301
  force = true

