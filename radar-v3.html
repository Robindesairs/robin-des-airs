<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>ROBIN DES AIRS — SYSTEM V3 FINAL</title>
    <link rel="icon" href="/favicon.png" type="image/png">
    <style>
        :root { --red: #ff4d4d; --green: #2ecc71; --blue: #3498db; --orange: #f39c12; --bg: #0a0a0a; --card: #161616; --border: #333; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 20px; line-height: 1.5; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--red); padding-bottom: 15px; margin-bottom: 25px; }
        .logo { font-size: 26px; font-weight: 900; color: var(--red); text-transform: uppercase; letter-spacing: 2px; }
        .clock { font-family: 'Courier New', monospace; color: var(--orange); font-size: 18px; font-weight: bold; }

        .dashboard { display: flex; gap: 20px; margin-bottom: 25px; flex-wrap: wrap; }
        .stat-card { background: var(--card); flex: 1; min-width: 140px; padding: 20px; border-radius: 12px; border: 1px solid var(--border); text-align: center; transition: transform 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-label { font-size: 12px; color: #888; text-transform: uppercase; font-weight: bold; margin-bottom: 10px; }
        .stat-value { font-size: 36px; font-weight: 900; }

        .toolbar { background: #111; padding: 20px; border-radius: 12px; display: flex; align-items: center; gap: 20px; margin-bottom: 25px; border: 1px solid #222; flex-wrap: wrap; }
        .btn { border: none; padding: 14px 28px; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: all 0.2s; font-size: 13px; }
        .btn-manual { background: var(--red); color: white; }
        .btn-auto { background: #222; color: #888; border: 2px solid #444; }
        .btn-auto.active { background: var(--green); color: black; border-color: var(--green); box-shadow: 0 0 20px rgba(46, 204, 113, 0.4); }
        .status-msg { font-size: 13px; color: #666; font-style: italic; }

        .table-container { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        thead th { background: #1f1f1f; color: #888; padding: 18px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        tbody td { padding: 18px; border-bottom: 1px solid #222; }
        
        .row-critical { background: rgba(255, 77, 77, 0.08) !important; border-left: 4px solid var(--red); }
        .row-critical:hover { background: rgba(255, 77, 77, 0.12) !important; }
        
        .badge-600 { background: var(--green); color: black; padding: 6px 12px; border-radius: 6px; font-weight: bold; }
        .btn-tracker { background: var(--blue); color: white; padding: 8px 14px; border-radius: 6px; text-decoration: none; font-size: 12px; font-weight: bold; display: inline-block; }
        .btn-tracker:hover { opacity: 0.9; color: white; }
        #loader { text-align: center; padding: 60px; color: #666; font-size: 16px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">🏹 Robin des Airs — System V3 Final</div>
        <div id="clock" class="clock">--:--:--</div>
    </div>

    <div class="dashboard">
        <div class="stat-card" style="border-bottom: 4px solid var(--red);">
            <div class="stat-label">Vols critiques</div>
            <div id="count-critical" class="stat-value" style="color: var(--red);">0</div>
        </div>
        <div class="stat-card" style="border-bottom: 4px solid var(--green);">
            <div class="stat-label">Cash potentiel</div>
            <div id="total-cash" class="stat-value" style="color: var(--green);">0 €</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Prochain scan</div>
            <div id="next-scan" class="stat-value" style="color: var(--blue); font-size: 22px;">—</div>
        </div>
    </div>

    <div class="toolbar">
        <button type="button" class="btn btn-manual" id="btn-scan">🚀 Scan manuel</button>
        <button type="button" class="btn btn-auto" id="btn-auto">⏱ Auto (10 min)</button>
        <span id="status-msg" class="status-msg">Prêt.</span>
    </div>

    <div id="loader">Chargement...</div>
    <div class="table-container" id="table-wrap" style="display: none;">
        <table>
            <thead>
                <tr>
                    <th>Vol</th>
                    <th>Cie</th>
                    <th>Trajet</th>
                    <th>Départ (Z)</th>
                    <th>Arrivée est. (Z)</th>
                    <th>Retard</th>
                    <th>Indemnité</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="flight-list"></tbody>
        </table>
    </div>

<script>
(function() {
    var REFRESH_INTERVAL_MS = 10 * 60 * 1000;
    var nextScanAt = 0;
    var countdownTimer = null;
    var autoTimer = null;

    function apiOrigin() {
        var o = window.location.origin || '';
        if (!o || o === 'file://' || /^https?:\/\/localhost(:\d+)?$/i.test(o))
            return 'https://robin-des-airs.netlify.app';
        return o;
    }

    function updateClock() {
        var el = document.getElementById('clock');
        if (el) el.textContent = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
    }
    setInterval(updateClock, 1000);
    updateClock();

    function updateCountdown() {
        var el = document.getElementById('next-scan');
        if (!el) return;
        var remaining = Math.max(0, Math.floor((nextScanAt - Date.now()) / 1000));
        if (remaining <= 0) {
            el.textContent = 'Bientôt...';
            return;
        }
        var min = Math.floor(remaining / 60);
        var sec = remaining % 60;
        el.textContent = (min > 0 ? min + ' min ' : '') + sec + ' s';
    }

    function load() {
        var status = document.getElementById('status-msg');
        var loader = document.getElementById('loader');
        var wrap = document.getElementById('table-wrap');
        var list = document.getElementById('flight-list');
        if (status) status.textContent = 'Scan en cours...';
        if (loader) loader.style.display = 'block';
        if (wrap) wrap.style.display = 'none';
        list.innerHTML = '';

        var url = apiOrigin() + '/.netlify/functions/radar?_=' + Date.now();
        fetch(url, { cache: 'no-store' }).then(function(r) { return r.text(); }).then(function(text) {
            var data = {};
            try { data = JSON.parse(text); } catch (e) { data = { flights: [], error: 'JSON invalide' }; }
            if (!data.flights) data.flights = [];
            var flights = data.flights.slice();
            var isCrit = function(f) { return f.cancelled || (f.delayMinutes != null && f.delayMinutes >= 150); };
            flights.sort(function(a, b) {
                var ac = isCrit(a) ? 0 : 1, bc = isCrit(b) ? 0 : 1;
                if (ac !== bc) return ac - bc;
                return (b.delayMinutes || 0) - (a.delayMinutes || 0);
            });

            var critCount = 0, cash = 0;
            flights.forEach(function(f) {
                var crit = isCrit(f);
                if (crit) critCount++;
                if (f.eligible && (f.color === 'RED' || f.color === 'ORANGE') && !f.surveillanceRetour) cash += 450;
                var row = document.createElement('tr');
                if (crit) row.className = 'row-critical';
                var dep = (f.scheduledDeparture || '').toString().replace(/Z$/i, '') || '—';
                var arr = (f.estimatedArrival || f.scheduledArrival || '—').toString().replace(/Z$/i, '') || '—';
                var delay = f.cancelled ? '—' : (f.delayMinutes != null ? f.delayMinutes + ' min' : '—');
                var indemnite = crit && f.eligible ? '<span class="badge-600">600 €</span>' : '—';
                var tracker = (f.trackerUrl && f.trackerUrl !== '#') ? '<a href="' + f.trackerUrl + '" target="_blank" class="btn-tracker">Traqueur</a>' : '—';
                row.innerHTML = '<td><b>' + (f.flight || '—') + '</b></td><td>' + (f.airline || '—') + '</td><td>' + (f.dep || '—') + ' → ' + (f.arr || '—') + '</td><td>' + dep + '</td><td>' + arr + '</td><td>' + delay + '</td><td>' + indemnite + '</td><td>' + tracker + '</td>';
                list.appendChild(row);
            });

            document.getElementById('count-critical').textContent = critCount;
            document.getElementById('total-cash').textContent = cash + ' €';
            if (loader) loader.style.display = 'none';
            if (wrap) wrap.style.display = 'block';
            if (status) status.textContent = 'Dernier scan : ' + flights.length + ' vol(s).';

            nextScanAt = Date.now() + REFRESH_INTERVAL_MS;
            if (countdownTimer) clearInterval(countdownTimer);
            updateCountdown();
            countdownTimer = setInterval(updateCountdown, 1000);
        }).catch(function(err) {
            if (status) status.textContent = 'Erreur : ' + (err.message || 'réseau');
            if (loader) loader.style.display = 'block';
            if (wrap) wrap.style.display = 'none';
        });
    }

    document.getElementById('btn-scan').onclick = load;
    document.getElementById('btn-auto').onclick = function() {
        var btn = document.getElementById('btn-auto');
        if (autoTimer) {
            clearInterval(autoTimer);
            autoTimer = null;
            btn.classList.remove('active');
            btn.textContent = '⏱ Auto (10 min)';
            document.getElementById('next-scan').textContent = '—';
        } else {
            load();
            autoTimer = setInterval(load, REFRESH_INTERVAL_MS);
            btn.classList.add('active');
            btn.textContent = '⏱ Auto ON';
        }
    };

    load();
})();
</script>
</body>
</html>
